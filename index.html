<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Fordonsräknare</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --bg: #0b1220;
  --surface: #182135;
  --surface2: #1e2d47;
  --text: #eef2f8;
  --muted: #7a90b0;
  --border: #2a3f5e;
}
html, body {
  height: 100%;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hdr-title { font-size: 16px; font-weight: 700; }
.hdr-date  { font-size: 12px; color: var(--muted); margin-top: 2px; }
.hdr-time  { font-size: 22px; font-weight: 300; color: var(--muted); letter-spacing: -0.5px; }
.hdr-right { text-align: right; }
.hdr-sync  { display: flex; align-items: center; justify-content: flex-end; gap: 5px; font-size: 10px; color: var(--muted); margin-top: 1px; }
.sync-dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
.sync-dot.online     { background: #10B981; }
.sync-dot.connecting { background: #F59E0B; }
.sync-dot.error      { background: #EF4444; }
.sync-dot.local      { background: #7a90b0; }

/* ── VIEWS ── */
.view {
  display: none;
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.view.active {
  display: flex;
  flex-direction: column;
}

/* ── COUNT VIEW ── */
.btn-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 9px;
  padding: 9px;
  flex: 1;
}
.v-btn {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  touch-action: manipulation;
  overflow: hidden;
  gap: 2px;
  transition: transform 0.08s, filter 0.08s;
  padding: 12px 6px 10px;
}
.v-btn:active {
  transform: scale(0.93);
  filter: brightness(0.75);
}
.v-btn-emoji { font-size: 28px; line-height: 1; pointer-events: none; margin-bottom: 3px; }
.v-btn-label {
  font-size: 19px;
  font-weight: 800;
  color: rgba(255,255,255,0.93);
  text-align: center;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  pointer-events: none;
  letter-spacing: 0.02em;
}
.v-btn-label-fi {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.72);
  text-align: center;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  pointer-events: none;
  letter-spacing: 0.02em;
}
.v-btn-badge {
  position: absolute;
  top: 7px;
  right: 7px;
  background: rgba(0,0,0,0.38);
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  min-width: 22px;
  height: 22px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  pointer-events: none;
}
/* Ripple flash on tap */
.v-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.22);
  opacity: 0;
  border-radius: inherit;
  pointer-events: none;
}
.v-btn.flash::after { animation: flash 0.28s ease-out; }
@keyframes flash {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

/* Footer bar */
.count-footer {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.footer-total-label { font-size: 13px; color: var(--muted); }
.footer-total-num   { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
.undo-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 8px 16px;
  border-radius: 22px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.undo-btn:disabled { opacity: 0.3; pointer-events: none; }

/* ── STATS VIEW ── */
.stats-wrap { padding: 14px 14px 24px; }
.sec-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 10px;
}
.cat-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 22px; }
.cat-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border-radius: 12px;
  padding: 10px 12px;
}
.cat-emoji   { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
.cat-name    { flex: 1; font-size: 14px; }
.cat-bar-bg  { width: 72px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
.cat-bar     { height: 100%; border-radius: 3px; transition: width 0.35s; }
.cat-count   { font-size: 16px; font-weight: 800; width: 28px; text-align: right; flex-shrink: 0; }

.hour-chart      { width: 100%; height: 200px; display: block; overflow: visible; }
.hour-chart-avg  { font-size: 12px; color: var(--muted); text-align: right; margin-top: 8px; }
.hour-chart-avg strong { color: var(--text); font-weight: 700; }

/* ── SUMMARY VIEW ── */
.sum-tabs { display: flex; gap: 6px; padding: 14px 14px 0; }
.sum-tab {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.sum-tab.active { background: #3B82F6; border-color: #3B82F6; color: #fff; }
.sum-panel { display: none; }
.sum-panel.active { display: block; }
.sum-wrap { padding: 14px 14px 32px; }
.total-card {
  background: var(--surface);
  border-radius: 18px;
  padding: 28px 20px 22px;
  text-align: center;
  margin-bottom: 10px;
}
.total-big { font-size: 72px; font-weight: 800; letter-spacing: -3px; line-height: 1; }
.total-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
.total-avg { font-size: 13px; color: var(--muted); margin-top: 4px; }
.total-avg strong { color: var(--text); font-weight: 700; }
.peak-card {
  background: var(--surface);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.peak-lbl { font-size: 12px; color: var(--muted); margin-bottom: 3px; }
.peak-val { font-size: 16px; font-weight: 700; }
.peak-right { text-align: right; }
.reset-btn {
  display: block;
  width: 100%;
  margin-top: 30px;
  padding: 15px;
  background: #7f1d1d;
  border: 1px solid #991b1b;
  color: #fca5a5;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.01em;
}
.reset-btn:active { background: #991b1b; }

.day-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.day-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border-radius: 12px;
  padding: 10px 12px;
}
.day-date  { font-size: 14px; }
.day-count { font-size: 16px; font-weight: 800; color: #3B82F6; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  padding: 28px 0;
}

/* ── NAV ── */
nav {
  flex-shrink: 0;
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 0 7px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  gap: 3px;
  cursor: pointer;
  transition: color 0.15s;
  letter-spacing: 0.03em;
}
.nav-btn.active { color: #60A5FA; }
.nav-icon { font-size: 22px; line-height: 1; }

/* ── MODAL ── */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}
.modal-bg.show { display: flex; }
.modal-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 26px 22px 22px;
  margin: 24px;
  max-width: 340px;
  width: 100%;
}
.modal-title { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
.modal-body  { font-size: 14px; color: var(--muted); line-height: 1.55; margin-bottom: 22px; }
.modal-btns  { display: flex; gap: 10px; }
.modal-cancel {
  flex: 1;
  padding: 13px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.modal-ok {
  flex: 1;
  padding: 13px;
  border-radius: 12px;
  border: none;
  background: #DC2626;
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}
</style>
</head>
<body>

<header>
  <div>
    <div class="hdr-title">⛴ Fordonsräknare</div>
    <div class="hdr-date" id="hdrDate"></div>
  </div>
  <div class="hdr-right">
    <div class="hdr-time" id="hdrTime"></div>
    <div class="hdr-sync" id="hdrSync"><span class="sync-dot local"></span><span id="syncText">Lokal</span></div>
  </div>
</header>

<!-- COUNT VIEW -->
<div class="view active" id="vCount">
  <div class="btn-grid" id="btnGrid"></div>
  <div class="count-footer">
    <div>
      <div class="footer-total-label">Totalt idag</div>
      <div class="footer-total-num" id="footerTotal">0</div>
    </div>
    <button class="undo-btn" id="undoBtn" onclick="undoLast()">Ångra</button>
  </div>
</div>

<!-- STATS VIEW -->
<div class="view" id="vStats">
  <div class="stats-wrap">
    <div class="sec-title">Per kategori</div>
    <div class="cat-list" id="statsCatList"></div>
    <div class="sec-title">Per timme</div>
    <div id="statsHourList"></div>
  </div>
</div>

<!-- SUMMARY VIEW -->
<div class="view" id="vSummary">
  <div class="sum-tabs">
    <button class="sum-tab active" id="sumTabIdag"  onclick="goSummaryTab('Idag')">Idag</button>
    <button class="sum-tab" id="sumTabVecka" onclick="goSummaryTab('Vecka')">Vecka</button>
    <button class="sum-tab" id="sumTabManad" onclick="goSummaryTab('Manad')">Månad</button>
  </div>

  <div class="sum-panel active" id="sumPanelIdag">
    <div class="sum-wrap">
      <div class="total-card">
        <div class="total-big" id="sumTotal">0</div>
        <div class="total-sub">fordon totalt idag</div>
        <div class="total-avg" id="sumAvg">Snitt: — fordon/tim</div>
      </div>
      <div class="peak-card">
        <div>
          <div class="peak-lbl">Toppimme</div>
          <div class="peak-val" id="peakHour">—</div>
        </div>
        <div class="peak-right">
          <div class="peak-lbl">Fordon</div>
          <div class="peak-val" id="peakCount">—</div>
        </div>
      </div>
      <div class="sec-title">Per kategori</div>
      <div class="cat-list" id="sumCatList"></div>
      <button class="reset-btn" onclick="confirmReset()">Återställ dagen</button>
    </div>
  </div>

  <div class="sum-panel" id="sumPanelVecka">
    <div class="sum-wrap" id="sumVeckaContent">
      <div class="empty">Hämtar data…</div>
    </div>
  </div>

  <div class="sum-panel" id="sumPanelManad">
    <div class="sum-wrap" id="sumManadContent">
      <div class="empty">Hämtar data…</div>
    </div>
  </div>
</div>

<!-- NAV -->
<nav>
  <button class="nav-btn active" id="navCount" onclick="goView('Count')">
    <span class="nav-icon">✚</span>
    <span>Räkna</span>
  </button>
  <button class="nav-btn" id="navStats" onclick="goView('Stats')">
    <span class="nav-icon">📊</span>
    <span>Statistik</span>
  </button>
  <button class="nav-btn" id="navSummary" onclick="goView('Summary')">
    <span class="nav-icon">📋</span>
    <span>Summering</span>
  </button>
</nav>

<!-- RESET MODAL -->
<div class="modal-bg" id="resetModal">
  <div class="modal-box">
    <div class="modal-title">Återställ dagen?</div>
    <div class="modal-body">All data för dagens trafikräkning raderas permanent. Åtgärden kan inte ångras.</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="hideReset()">Avbryt</button>
      <button class="modal-ok" onclick="doReset()">Återställ</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (compat build, loaded from CDN; app falls back to local-only if unavailable) -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const CATS = [
  { id: 'personbil',  label: 'Personbil',  labelFi: 'Henkilöauto',   emoji: '🚗',  color: '#1D4ED8' },
  { id: 'paketbil',   label: 'Paketbil',   labelFi: 'Pakettiauto',   emoji: '🚐',  color: '#6D28D9' },
  { id: 'lastbil',    label: 'Lastbil',     labelFi: 'Kuorma-auto',   emoji: '🚛',  color: '#B91C1C' },
  { id: 'traktor',    label: 'Traktor',     labelFi: 'Traktori',      emoji: '🚜',  color: '#92400E' },
  { id: 'cykel',      label: 'Cykel',       labelFi: 'Polkupyörä',    emoji: '🚲',  color: '#065F46' },
  { id: 'mc',         label: 'MC',          labelFi: 'Moottoripyörä', emoji: '🏍️',  color: '#C2410C' },
  { id: 'fotgangare', label: 'Fotgängare',  labelFi: 'Jalankulkija',  emoji: '🚶',  color: '#0E7490' },
  { id: 'moped',      label: 'Moped',       labelFi: 'Mopo',          emoji: '🛵',  color: '#9D174D' },
  { id: 'fyrhjuling', label: 'Fyrhjuling',  labelFi: 'Mönkijä',       emoji: '🏎️',  color: '#3730A3' },
];

const KEY = 'farjeraknare_v1';

// ── FIREBASE SYNC ──
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
  authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare",
  storageBucket: "fordonsraknare.firebasestorage.app",
  messagingSenderId: "260033893182",
  appId: "1:260033893282:web:328da94483ad4b245f926f",
  databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

let db = null, logsRef = null;

function setSyncStatus(state) {
  const dot = document.querySelector('#hdrSync .sync-dot');
  const txt = document.getElementById('syncText');
  if (!dot || !txt) return;
  dot.className = 'sync-dot ' + state;
  txt.textContent = { online: 'Synkad', connecting: 'Ansluter…', error: 'Sync-fel', local: 'Lokal' }[state] || 'Lokal';
}

function initFirebase() {
  if (typeof firebase === 'undefined') { setSyncStatus('local'); return; }
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    logsRef = db.ref('days/' + localDate() + '/logs');
    setSyncStatus('connecting');

    // Connection state
    db.ref('.info/connected').on('value', s => {
      setSyncStatus(s.val() === true ? 'online' : 'connecting');
    });

    // Live data: rebuild local cache from server (source of truth) and re-render
    logsRef.on('value', snap => {
      const logs = [];
      snap.forEach(ch => {
        const v = ch.val();
        logs.push({ id: ch.key, type: v.type, ts: v.ts });
      });
      logs.sort((a, b) => a.ts - b.ts);
      save({ date: localDate(), logs });
      refreshAll();
    }, () => setSyncStatus('error'));
  } catch (e) {
    db = null; logsRef = null;
    setSyncStatus('local');
  }
}

function localDate() {
  const n = new Date();
  return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
}

function pad(n) { return String(n).padStart(2, '0'); }

function load() {
  try {
    const r = localStorage.getItem(KEY);
    if (!r) return { date: localDate(), logs: [] };
    const d = JSON.parse(r);
    return d.date === localDate() ? d : { date: localDate(), logs: [] };
  } catch { return { date: localDate(), logs: [] }; }
}

function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function counts() {
  const d = load();
  const c = {};
  CATS.forEach(cat => c[cat.id] = 0);
  d.logs.forEach(l => { if (c[l.type] !== undefined) c[l.type]++; });
  return c;
}

function hourlyData() {
  const d = load();
  const h = {};
  d.logs.forEach(l => {
    const hr = new Date(l.ts).getHours();
    if (!h[hr]) h[hr] = {};
    if (!h[hr][l.type]) h[hr][l.type] = 0;
    h[hr][l.type]++;
  });
  return h;
}

function hourTotal(hObj) {
  return Object.values(hObj).reduce((a, b) => a + b, 0);
}

// Smooth cubic-bezier path through points (Catmull-Rom style)
function smoothPath(xs, ys) {
  let d = `M${xs[0].toFixed(1)},${ys[0].toFixed(1)}`;
  const smoothing = 0.2;
  for (let i = 0; i < xs.length - 1; i++) {
    const x0 = i > 0 ? xs[i-1] : xs[i];
    const y0 = i > 0 ? ys[i-1] : ys[i];
    const x1 = xs[i], y1 = ys[i];
    const x2 = xs[i+1], y2 = ys[i+1];
    const x3 = i < xs.length - 2 ? xs[i+2] : x2;
    const y3 = i < xs.length - 2 ? ys[i+2] : y2;
    const cp1x = x1 + (x2 - x0) * smoothing;
    const cp1y = y1 + (y2 - y0) * smoothing;
    const cp2x = x2 - (x3 - x1) * smoothing;
    const cp2y = y2 - (y3 - y1) * smoothing;
    d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}`;
  }
  return d;
}

let hourTipTimer = null;
function showHourTip(cx, cy, label) {
  const tip = document.getElementById('hourTip');
  const text = document.getElementById('hourTipText');
  const rect = document.getElementById('hourTipRect');
  if (!tip || !text || !rect) return;
  text.setAttribute('x', cx);
  text.setAttribute('y', cy - 12);
  text.textContent = label;
  const bbox = text.getBBox();
  rect.setAttribute('x', bbox.x - 6);
  rect.setAttribute('y', bbox.y - 4);
  rect.setAttribute('width', bbox.width + 12);
  rect.setAttribute('height', bbox.height + 8);
  tip.style.opacity = '1';
  clearTimeout(hourTipTimer);
  hourTipTimer = setTimeout(() => { tip.style.opacity = '0'; }, 2200);
}

// ── BUILD BUTTONS ──
function buildGrid() {
  const grid = document.getElementById('btnGrid');
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'v-btn';
    btn.id = 'btn_' + cat.id;
    btn.style.backgroundColor = cat.color;
    btn.innerHTML =
      `<span class="v-btn-emoji">${cat.emoji}</span>` +
      `<span class="v-btn-label">${cat.label}</span>` +
      `<span class="v-btn-label-fi">${cat.labelFi}</span>` +
      `<span class="v-btn-badge" id="b_${cat.id}">0</span>`;
    btn.addEventListener('click', () => tap(cat.id, btn));
    grid.appendChild(btn);
  });
}

let audioCtx = null;
function playClick() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
  } catch (e) {}
}

function tap(catId, btn) {
  if (navigator.vibrate) navigator.vibrate(12);
  playClick();
  btn.classList.remove('flash');
  void btn.offsetWidth;
  btn.classList.add('flash');

  const ts = Date.now();
  const d = load();
  if (db && logsRef) {
    // push() returns the key synchronously → optimistic local write, then sync
    const ref = logsRef.push();
    d.logs.push({ id: ref.key, type: catId, ts });
    save(d);
    ref.set({ type: catId, ts }).catch(() => {});
  } else {
    d.logs.push({ id: 'local_' + ts + '_' + Math.random().toString(36).slice(2, 7), type: catId, ts });
    save(d);
  }
  renderCount();
}

function undoLast() {
  const d = load();
  if (!d.logs.length) return;
  const last = d.logs[d.logs.length - 1];
  if (db && logsRef && last.id && !String(last.id).startsWith('local_')) {
    logsRef.child(last.id).remove().catch(() => {});
  }
  d.logs.pop();
  save(d);
  renderCount();
}

// ── RENDER: COUNT VIEW ──
function renderCount() {
  const c = counts();
  const total = Object.values(c).reduce((a, b) => a + b, 0);
  CATS.forEach(cat => {
    const el = document.getElementById('b_' + cat.id);
    if (el) el.textContent = c[cat.id];
  });
  document.getElementById('footerTotal').textContent = total;
  document.getElementById('undoBtn').disabled = (load().logs.length === 0);
}

// ── RENDER: STATS VIEW ──
function renderStats() {
  const c = counts();
  const total = Object.values(c).reduce((a, b) => a + b, 0);
  const maxCat = Math.max(...Object.values(c), 1);

  const cl = document.getElementById('statsCatList');
  cl.innerHTML = '';
  CATS.forEach(cat => {
    const n = c[cat.id];
    const bw = Math.round(n / maxCat * 100);
    cl.innerHTML +=
      `<div class="cat-row">` +
        `<span class="cat-emoji">${cat.emoji}</span>` +
        `<span class="cat-name">${cat.label}</span>` +
        `<div class="cat-bar-bg"><div class="cat-bar" style="width:${bw}%;background:${cat.color}"></div></div>` +
        `<span class="cat-count" style="color:${cat.color}">${n}</span>` +
      `</div>`;
  });

  const h = hourlyData();
  const hl = document.getElementById('statsHourList');
  const hrs = Object.keys(h).map(Number).sort((a, b) => a - b);

  if (!hrs.length) {
    hl.innerHTML = '<div class="empty">Inga fordon loggade än.</div>';
    return;
  }

  // Hour range: data hours padded by one hour before/after, clamped to 0–23
  const minH = Math.max(0, hrs[0] - 1);
  const maxH = Math.min(23, hrs[hrs.length - 1] + 1);
  const range = [];
  for (let hr = minH; hr <= maxH; hr++) range.push(hr);

  const values = range.map(hr => h[hr] ? hourTotal(h[hr]) : 0);
  const maxV = Math.max(...values, 1);
  const totalData = hrs.reduce((sum, hr) => sum + hourTotal(h[hr]), 0);
  const avg = totalData / hrs.length;

  const W = 320, H = 200;
  const padL = 28, padR = 10, padT = 14, padB = 22;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const baseY = padT + plotH;

  const stepX = plotW / (range.length - 1);
  const xs = range.map((_, i) => padL + i * stepX);
  const ys = values.map(v => padT + plotH - (v / maxV) * plotH);
  const yAvg = padT + plotH - (avg / maxV) * plotH;

  const linePath = smoothPath(xs, ys);
  const fillPath = `${linePath} L${xs[xs.length-1].toFixed(1)},${baseY} L${xs[0].toFixed(1)},${baseY} Z`;

  let xLabels = '';
  let points = '';
  range.forEach((hr, i) => {
    const n = values[i];
    const x = xs[i].toFixed(1), y = ys[i].toFixed(1);
    const tip = `${pad(hr)}:00 — ${n} fordon`;
    xLabels += `<text x="${x}" y="${H - 6}" text-anchor="middle" style="font-size:9px; fill:var(--muted);">${hr}</text>`;
    points +=
      `<circle cx="${x}" cy="${y}" r="13" fill="transparent" style="cursor:pointer;" onclick="showHourTip(${x},${y},'${tip}')" onmouseenter="showHourTip(${x},${y},'${tip}')"></circle>` +
      `<circle cx="${x}" cy="${y}" r="3.5" style="fill:#3B82F6; stroke:var(--surface); stroke-width:1.5; pointer-events:none;"></circle>`;
  });

  hl.innerHTML =
    `<svg class="hour-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">` +
      `<defs>` +
        `<linearGradient id="hourFillGrad" x1="0" y1="0" x2="0" y2="1">` +
          `<stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"></stop>` +
          `<stop offset="100%" stop-color="#3B82F6" stop-opacity="0"></stop>` +
        `</linearGradient>` +
      `</defs>` +
      `<line x1="${padL}" y1="${baseY}" x2="${W - padR}" y2="${baseY}" style="stroke:var(--border); stroke-width:1;"></line>` +
      `<line x1="${padL}" y1="${yAvg.toFixed(1)}" x2="${W - padR}" y2="${yAvg.toFixed(1)}" style="stroke:var(--muted); stroke-width:1; stroke-dasharray:4 3;"></line>` +
      `<path d="${fillPath}" fill="url(#hourFillGrad)"></path>` +
      `<path d="${linePath}" fill="none" style="stroke:#3B82F6; stroke-width:2.5;"></path>` +
      points +
      `<text x="${padL - 5}" y="${baseY + 3}" text-anchor="end" style="font-size:9px; fill:var(--muted);">0</text>` +
      `<text x="${padL - 5}" y="${padT + 7}" text-anchor="end" style="font-size:9px; fill:var(--muted);">${maxV}</text>` +
      xLabels +
      `<g id="hourTip" style="opacity:0; transition:opacity .15s; pointer-events:none;">` +
        `<rect id="hourTipRect" rx="4" ry="4" style="fill:var(--surface2); stroke:var(--border);"></rect>` +
        `<text id="hourTipText" text-anchor="middle" style="font-size:11px; font-weight:700; fill:var(--text);"></text>` +
      `</g>` +
    `</svg>` +
    `<div class="hour-chart-avg">Snitt: <strong>${Math.round(avg)}</strong> fordon/tim</div>`;
}

// ── RENDER: SUMMARY VIEW ──
function renderSummary() {
  const c = counts();
  const total = Object.values(c).reduce((a, b) => a + b, 0);
  document.getElementById('sumTotal').textContent = total;

  const h = hourlyData();
  const hrs = Object.keys(h).map(Number);
  if (hrs.length) {
    const peak = hrs.reduce((best, hr) => hourTotal(h[hr]) > hourTotal(h[best]) ? hr : best, hrs[0]);
    const pn = hourTotal(h[peak]);
    document.getElementById('peakHour').textContent =
      `${pad(peak)}:00 – ${pad(peak+1 < 24 ? peak+1 : 0)}:00`;
    document.getElementById('peakCount').textContent = `${pn} fordon`;
    document.getElementById('sumAvg').innerHTML =
      `Snitt: <strong>${Math.round(total / hrs.length)}</strong> fordon/tim`;
  } else {
    document.getElementById('peakHour').textContent = '—';
    document.getElementById('peakCount').textContent = '—';
    document.getElementById('sumAvg').textContent = 'Snitt: — fordon/tim';
  }

  const cl = document.getElementById('sumCatList');
  cl.innerHTML = '';
  CATS.forEach(cat => {
    const n = c[cat.id];
    cl.innerHTML +=
      `<div class="cat-row">` +
        `<span class="cat-emoji">${cat.emoji}</span>` +
        `<span class="cat-name">${cat.label}</span>` +
        `<span class="cat-count" style="color:${cat.color}">${n}</span>` +
      `</div>`;
  });
}

// ── RENDER: SUMMARY HISTORY (Vecka / Månad) ──
function dateStrFromParts(y, m, d) { return `${y}-${pad(m)}-${pad(d)}`; }

function last7Days() {
  const dates = [];
  const now = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
    dates.push(dateStrFromParts(d.getFullYear(), d.getMonth() + 1, d.getDate()));
  }
  return dates;
}

function currentMonthDays() {
  const now = new Date();
  const dates = [];
  for (let day = 1; day <= now.getDate(); day++) {
    dates.push(dateStrFromParts(now.getFullYear(), now.getMonth() + 1, day));
  }
  return dates;
}

function fmtDayLabel(dStr) {
  const [y, m, d] = dStr.split('-').map(Number);
  const label = new Date(y, m - 1, d).toLocaleDateString('sv-SE', { weekday: 'short', day: 'numeric', month: 'short' });
  return label.charAt(0).toUpperCase() + label.slice(1);
}

// Resolve a single day's total: live Firebase count, or local cache for today when offline
function fetchDayTotal(dStr) {
  if (!db) {
    if (dStr === localDate()) return Promise.resolve(Object.values(counts()).reduce((a, b) => a + b, 0));
    return Promise.resolve(0);
  }
  return db.ref('days/' + dStr + '/logs').once('value')
    .then(snap => snap.numChildren())
    .catch(() => 0);
}

function dayListHtml(dates, totals) {
  let rows = '';
  dates.forEach((dStr, i) => {
    rows += `<div class="day-row"><span class="day-date">${fmtDayLabel(dStr)}</span><span class="day-count">${totals[i]}</span></div>`;
  });
  return `<div class="day-list">${rows}</div>`;
}

function renderWeek() {
  const container = document.getElementById('sumVeckaContent');
  container.innerHTML = '<div class="empty">Hämtar data…</div>';
  const dates = last7Days();
  Promise.all(dates.map(fetchDayTotal)).then(totals => {
    if (summaryTab !== 'Vecka') return;
    const total = totals.reduce((a, b) => a + b, 0);
    container.innerHTML =
      `<div class="total-card">` +
        `<div class="total-big">${total}</div>` +
        `<div class="total-sub">fordon senaste 7 dagarna</div>` +
      `</div>` +
      dayListHtml(dates, totals);
  });
}

function renderMonth() {
  const container = document.getElementById('sumManadContent');
  container.innerHTML = '<div class="empty">Hämtar data…</div>';
  const dates = currentMonthDays();
  Promise.all(dates.map(fetchDayTotal)).then(totals => {
    if (summaryTab !== 'Manad') return;
    const total = totals.reduce((a, b) => a + b, 0);
    const avg = total / dates.length;
    const monthName = new Date().toLocaleDateString('sv-SE', { month: 'long' });
    container.innerHTML =
      `<div class="total-card">` +
        `<div class="total-big">${total}</div>` +
        `<div class="total-sub">fordon i ${monthName}</div>` +
        `<div class="total-avg">Snitt: <strong>${Math.round(avg)}</strong> fordon/dag</div>` +
      `</div>` +
      dayListHtml(dates, totals);
  });
}

// ── VIEW SWITCHING ──
const VIEWS = ['Count', 'Stats', 'Summary'];
let currentView = 'Count';
function goView(name) {
  currentView = name;
  VIEWS.forEach(v => {
    document.getElementById('v' + v).classList.toggle('active', v === name);
    document.getElementById('nav' + v).classList.toggle('active', v === name);
  });
  if (name === 'Stats')   renderStats();
  if (name === 'Summary') goSummaryTab(summaryTab);
}

const SUMMARY_TABS = ['Idag', 'Vecka', 'Manad'];
let summaryTab = 'Idag';
function goSummaryTab(name) {
  summaryTab = name;
  SUMMARY_TABS.forEach(t => {
    document.getElementById('sumTab' + t).classList.toggle('active', t === name);
    document.getElementById('sumPanel' + t).classList.toggle('active', t === name);
  });
  if (name === 'Idag')  renderSummary();
  if (name === 'Vecka') renderWeek();
  if (name === 'Manad') renderMonth();
}

// Re-render whatever is on screen (used by the live Firebase listener)
function refreshAll() {
  renderCount();
  if (currentView === 'Stats')   renderStats();
  if (currentView === 'Summary' && summaryTab === 'Idag') renderSummary();
}

// ── RESET ──
function confirmReset() { document.getElementById('resetModal').classList.add('show'); }
function hideReset()    { document.getElementById('resetModal').classList.remove('show'); }
function doReset() {
  if (db) db.ref('days/' + localDate()).remove().catch(() => {});
  save({ date: localDate(), logs: [] });
  hideReset();
  renderCount();
  goView('Count');
}

// ── CLOCK ──
function tick() {
  const n = new Date();
  document.getElementById('hdrTime').textContent =
    n.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('hdrDate').textContent =
    n.toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long' });
}

buildGrid();
renderCount();
tick();
setInterval(tick, 10000);
initFirebase();
</script>
