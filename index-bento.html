<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Färjeräknare TACTICAL v1.9.8</title>
<link rel="stylesheet" href="tactical.css">
</head>
<body>

<div class="dashboard">
  <div class="btn-grid-area">
      <!-- Vi använder enkla onclick för max stabilitet på Mac -->
      <button class="v-btn" onpointerdown="btnStart(this)" onpointerup="btnEnd('personbil', this)" onpointerleave="btnStop()">
          <span class="v-btn-badge" id="b_personbil">0</span><span class="v-btn-emoji">🚗</span><span class="v-btn-label">Bil</span>
      </button>
      <button class="v-btn" onpointerdown="btnStart(this)" onpointerup="btnEnd('paketbil', this)" onpointerleave="btnStop()">
          <span class="v-btn-badge" id="b_paketbil">0</span><span class="v-btn-emoji">🚐</span><span class="v-btn-label">Paket</span>
      </button>
      <button class="v-btn" onpointerdown="btnStart(this)" onpointerup="btnEnd('lastbil', this)" onpointerleave="btnStop()">
          <span class="v-btn-badge" id="b_lastbil">0</span><span class="v-btn-emoji">🚛</span><span class="v-btn-label">Lastbil</span>
      </button>
      <button class="v-btn" onpointerdown="btnStart(this)" onpointerup="btnEnd('traktor', this)" onpointerleave="btnStop()">
          <span class="v-btn-badge" id="b_traktor">0</span><span class="v-btn-emoji">🚜</span><span class="v-btn-label">Traktor</span>
      </button>
      <button class="v-btn" onpointerdown="btnStart(this)" onpointerup="btnEnd('cykel', this)" onpointerleave="btnStop()">
          <span class="v-btn-badge" id="b_cykel">0</span><span class="v-btn-emoji">🚲</span><span class="v-btn-label">Cykel</span>
      </button>
      <button class="v-btn" onpointerdown="btnStart(this)" onpointerup="btnEnd('mc', this)" onpointerleave="btnStop()">
          <span class="v-btn-badge" id="b_mc">0</span><span class="v-btn-emoji">🏍️</span><span class="v-btn-label">MC</span>
      </button>
      <button class="v-btn" onpointerdown="btnStart(this)" onpointerup="btnEnd('fotgangare', this)" onpointerleave="btnStop()">
          <span class="v-btn-badge" id="b_fotgangare">0</span><span class="v-btn-emoji">🚶</span><span class="v-btn-label">Gående</span>
      </button>
      <button class="v-btn" onpointerdown="btnStart(this)" onpointerup="btnEnd('moped', this)" onpointerleave="btnStop()">
          <span class="v-btn-badge" id="b_moped">0</span><span class="v-btn-emoji">🛵</span><span class="v-btn-label">Moped</span>
      </button>
      <button class="v-btn" onpointerdown="btnStart(this)" onpointerup="btnEnd('fyrhjuling', this)" onpointerleave="btnStop()">
          <span class="v-btn-badge" id="b_fyrhjuling">0</span><span class="v-btn-emoji">🏎️</span><span class="v-btn-label">ATV</span>
      </button>
  </div>

  <div class="tile tile-speed" onclick="toggleOverlay('navOverlay', true)">
    <div class="tile-header">VELOCITY / TACTICAL</div>
    <div style="width:100%; position:relative; display:flex; justify-content:center; flex:1;">
        <svg viewBox="0 0 200 130" style="height: 100%; width: 100%;">
            <path d="M 40 110 A 70 70 0 1 1 160 110" fill="none" stroke="#111" stroke-width="12" stroke-dasharray="8 2"/>
            <path id="speedArc" d="M 40 110 A 70 70 0 1 1 160 110" fill="none" stroke="var(--accent)" stroke-width="12" stroke-dasharray="0 1000" />
            <text id="mainSpeedNum" x="100" y="100" text-anchor="middle" fill="#fff" style="font-size: 58px; font-weight: 300;">0.0</text>
            <text x="100" y="115" text-anchor="middle" fill="var(--accent)" style="font-size: 10px; font-weight: 900; letter-spacing: 2px;">KNOTS</text>
        </svg>
    </div>
  </div>

  <div class="tile tile-env" onclick="toggleOverlay('weatherOverlay', true)">
    <div class="tile-header">ENVIRONMENT / HANGÖ</div>
    <div class="water-display" id="waterDisplay">-- CM</div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 5px;">
        <div style="display:flex; align-items:center; gap:8px;">
            <span id="mainWeatherIcon" style="font-size:24px;">☀️</span>
            <span id="windMain" style="font-weight:800; font-size:18px;">-- M/S</span>
        </div>
        <div id="windDir"><svg width="24" height="24" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="var(--accent)"/></svg></div>
    </div>
  </div>

  <div class="tile tile-log" onclick="toggleOverlay('statsOverlay', true)">
    <div class="tile-header">
        <span>MISSION CONTROL</span>
        <a href="https://notebooklm.google.com/" target="_blank" style="color:var(--accent); font-size: 8px; border: 1px solid var(--accent); padding: 0 4px; border-radius: 2px;">DOCS</a>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
        <div style="background:rgba(0,0,0,0.3); padding:4px; text-align:center; border-radius:4px;"><span style="font-size:7px; color:var(--dim); display:block;">VEH</span><span id="miniStatTotal" style="font-size:14px; font-weight:800; color:#fff;">0</span></div>
        <div style="background:rgba(0,0,0,0.3); padding:4px; text-align:center; border-radius:4px;"><span style="font-size:7px; color:var(--dim); display:block;">DEP</span><span id="miniStatTrips" style="font-size:14px; font-weight:800; color:#fff;">0</span></div>
    </div>
    <div class="dep-list" id="departureLog"></div>
    <div class="sys-bar-internal">
        <div style="display:flex; align-items:center;"><div id="syncDot" style="width:6px; height:6px; background:grey; border-radius:1px; margin-right:4px;"></div>SYNC</div>
        <div style="text-align:right;">v1.9.8-B</div>
    </div>
  </div>
</div>

<!-- OVERLAYS -->
<div id="navOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span>NAVIGATION_DATA</span><button onclick="toggleOverlay('navOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; font-weight:800;">CLOSE</button></div>
    <div class="overlay-scroll">
        <div class="tile" style="margin-bottom:10px;"><span class="tile-header">MAX_SPEED</span><span id="statMaxSpeed" style="font-size:48px;">0.0 kn</span></div>
        <div class="tile"><span class="tile-header">DISTANCE</span><span id="statDistance" style="font-size:48px;">0.00 NM</span></div>
    </div>
</div>

<div id="weatherOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span>WEATHER_48H</span><button onclick="toggleOverlay('weatherOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; font-weight:800;">CLOSE</button></div>
    <div id="prognosContent" class="overlay-scroll"></div>
</div>

<div id="statsOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span>MISSION_SORTIE_LOG</span><button onclick="toggleOverlay('statsOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800;">CLOSE</button></div>
    <div id="statsContent" class="overlay-scroll"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q", authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare", databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

var db, logsRef, tripsRef, fullWeatherData, currentLogs = {}, currentTrips = {};
var maxSpeedKn = 0, totalDistanceNM = 0, lastLat = null, lastLon = null;
var lastDepartureTs = Date.now();
var undoTimer = null, didUndo = false;

// ── FIXED STABLE CLICK LOGIC ──
function btnStart(btn) {
    didUndo = false;
    undoTimer = setTimeout(() => {
        didUndo = true;
        btn.classList.add('removing');
    }, 700);
}

function btnStop() {
    clearTimeout(undoTimer);
}

function btnEnd(id, btn) {
    clearTimeout(undoTimer);
    if (didUndo) {
        // Genomför Undo
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
        if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: -1 });
        setTimeout(() => btn.classList.remove('removing'), 1000);
    } else {
        // Genomför Tap
        if (navigator.vibrate) navigator.vibrate(20);
        if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: 1 });
    }
    didUndo = false;
}

function toggleOverlay(id, show) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.display = show ? 'flex' : 'none';
    if (show && id === 'statsOverlay') renderFullStats();
    if (show && id === 'weatherOverlay') fetchWeather();
}

function calculateStats() {
    const logs = Object.values(currentLogs);
    const total = logs.reduce((sum, l) => sum + (l.delta || 1), 0);
    document.getElementById('miniStatTotal').textContent = total;
    document.getElementById('miniStatTrips').textContent = Object.values(currentTrips).length;
    if (Object.values(currentTrips).length > 0) {
        lastDepartureTs = Math.max(...Object.values(currentTrips).map(t => t.ts));
    }
    renderMiniLog();
}

function renderMiniLog() {
    const logDiv = document.getElementById('departureLog');
    if (!logDiv) return;
    const sortedTrips = Object.values(currentTrips).sort((a,b) => b.ts - a.ts);
    const logs = Object.values(currentLogs);
    logDiv.innerHTML = sortedTrips.slice(0, 3).map(t => {
        const time = new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        const veh = logs.filter(l => Math.abs(l.ts - t.ts) <= 180000).reduce((sum, l) => sum + (l.delta || 1), 0);
        return `<div class="dep-row"><span>${time}</span><span style="color:var(--dim)">${t.from || '---'}</span><span>${veh}</span></div>`;
    }).join('');
}

function renderFullStats() {
    const container = document.getElementById('statsContent');
    if (!container) return;
    const logs = Object.values(currentLogs);
    const trips = Object.values(currentTrips).sort((a,b) => b.ts - a.ts);
    const total = logs.reduce((sum, l) => sum + (l.delta || 1), 0);
    
    container.innerHTML = `
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
            <div class="tile"><span class="tile-header">VEH_TOTAL</span><div style="font-size:32px;">${total}</div></div>
            <div class="tile"><span class="tile-header">DEP_TOTAL</span><div style="font-size:32px;">${trips.length}</div></div>
        </div>
        <div class="tile-header">SORTIE_HISTORY_20</div>
        ${trips.slice(0, 20).map(t => {
            const time = new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
            const veh = logs.filter(l => Math.abs(l.ts - t.ts) <= 180000).reduce((sum, l) => sum + (l.delta || 1), 0);
            return `<div class="dep-row"><span>${time}</span><span>${t.from || '---'}</span><span style="color:var(--warning)">${veh}</span></div>`;
        }).join('')}
    `;
}

// ── WEATHER ──
async function fetchWeather() {
    try {
        const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=60.03&longitude=22.92&hourly=windspeed_10m,winddirection_10m,weathercode,temperature_2m&wind_speed_unit=ms&timezone=Europe%2FHelsinki`);
        fullWeatherData = await resp.json();
        const hr = new Date().getHours();
        document.getElementById('windMain').textContent = fullWeatherData.hourly.windspeed_10m[hr].toFixed(1) + ' M/S';
        document.getElementById('windDir').style.transform = `rotate(${(fullWeatherData.hourly.winddirection_10m[hr] + 180) % 360}deg)`;
        const icons = { 0: "☀️", 1: "🌤️", 2: "🌤️", 3: "☁️", 45: "🌫️", 51: "🌧️", 61: "🌧️", 71: "❄️", 95: "⛈️" };
        document.getElementById('mainWeatherIcon').textContent = icons[fullWeatherData.hourly.weathercode[hr]] || "🌤️";
        
        const container = document.getElementById('prognosContent');
        if (container) {
            let html = ""; const h = fullWeatherData.hourly;
            for (let i = hr; i < h.time.length && i < hr + 48; i++) {
                const color = h.windspeed_10m[i] < 6 ? "#30d158" : h.windspeed_10m[i] < 12 ? "#ffd60a" : "#ff453a";
                html += `<div class="prognos-row" style="border-left-color: ${color}">
                    <div style="font-weight:900;">${h.time[i].slice(11, 16)}</div>
                    <div style="font-size:22px;">${icons[h.weathercode[i]] || "🌤️"}</div>
                    <div style="font-weight:800; color:${color}">${h.windspeed_10m[i].toFixed(1)} m/s</div>
                    <div style="transform: rotate(${(h.winddirection_10m[i]+180)%360}deg); display:flex; justify-content:center;">
                        <svg width="18" height="18" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="${color}"/></svg>
                    </div>
                    <div style="font-weight:800; text-align:right;">${h.temperature_2m[i].toFixed(1)}°C</div>
                </div>`;
            }
            container.innerHTML = html;
        }
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  firebase.initializeApp(firebaseConfig); db = firebase.database();
  const today = new Date().toISOString().slice(0, 10);
  logsRef = db.ref('days/' + today + '/logs'); tripsRef = db.ref('turer/' + today);

  db.ref('.info/connected').on('value', s => {
      const dot = document.getElementById('syncDot');
      if (dot) dot.style.background = s.val() === true ? 'var(--safe)' : 'grey';
  });

  logsRef.on('value', snap => {
    currentLogs = snap.val() || {};
    ['personbil', 'paketbil', 'lastbil', 'traktor', 'cykel', 'mc', 'fotgangare', 'moped', 'fyrhjuling'].forEach(id => {
        let count = 0; Object.values(currentLogs).forEach(l => { if(l.type === id) count += (l.delta || 1); });
        const el = document.getElementById('b_' + id); if (el) el.textContent = Math.max(0, count);
    });
    calculateStats();
  });

  tripsRef.on('value', snap => {
    currentTrips = snap.val() || {};
    calculateStats();
  });

  db.ref('config/watlev').on('value', snap => {
    if (snap.val()) {
        const disp = document.getElementById('waterDisplay');
        if (disp) disp.textContent = (snap.val().value > 0 ? '+' : '') + snap.val().value + ' CM';
    }
  });

  navigator.geolocation.watchPosition(pos => {
    const kn = pos.coords.speed * 1.94384 || 0;
    document.getElementById('mainSpeedNum').textContent = kn.toFixed(1);
    document.getElementById('speedArc').style.strokeDasharray = `${(Math.min(kn, 10) / 10) * 400} 1000`;
    if (kn > maxSpeedKn) maxSpeedKn = kn;
    document.getElementById('statMaxSpeed').textContent = maxSpeedKn.toFixed(1) + " kn";
  }, null, { enableHighAccuracy: true });

  fetchWeather();
});
</script>
</body>
</html>
