<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknare BENTO v1.4.3</title>
<style>
:root {
  --bg: #05080f;
  --surface: #121a2b;
  --glass: rgba(24, 33, 53, 0.95);
  --glass-border: rgba(255, 255, 255, 0.3);
  --text: #ffffff;
  --accent: #3B82F6;
  --signal-yellow: #FACC15; 
  --green: #10B981;
  --red: #EF4444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.dashboard {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr; 
  grid-template-rows: 1fr 1fr 1fr;
  gap: 12px;
  padding: 12px;
  flex: 1;
}

.tile {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

#btnGrid {
  grid-column: 1 / 3;
  grid-row: 1 / 4;
  display: grid !important;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 10px;
}
.tile-speed { grid-column: 3 / 4; grid-row: 1 / 2; align-items: center; justify-content: space-between; }
.tile-env   { grid-column: 3 / 4; grid-row: 2 / 3; justify-content: space-between; cursor: pointer; }
.tile-log   { grid-column: 3 / 4; grid-row: 3 / 4; }

.v-btn {
  position: relative;
  width: 100%; height: 100%;
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.v-btn:active { transform: translateY(2px); filter: brightness(1.2); }
.v-btn-emoji { font-size: clamp(24px, 5vh, 44px); }
.v-btn-label { font-size: clamp(10px, 1.5vh, 13px); font-weight: 900; margin-top: 4px; text-transform: uppercase; }

.v-btn-badge {
  position: absolute;
  top: -5px; right: -5px;
  background: var(--signal-yellow);
  color: #000;
  padding: 4px 8px;
  border-radius: 10px;
  font-size: 18px;
  font-weight: 900;
  border: 2px solid #000;
  z-index: 10;
}

.tile-title { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
.water-val { font-size: 34px; font-weight: 900; color: var(--green); }
.wind-box { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 15px; border: 1px solid var(--glass-border); width: 100%; }

#speedValDisplay { font-size: 28px; font-weight: 900; }
.speedo-svg { width: 100%; height: auto; max-height: 90px; }

.sys-status {
  height: 25px;
  padding: 0 15px;
  font-size: 10px;
  font-weight: 800;
  color: #4a5568;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #000;
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2d3748; margin-right: 5px; }
.dot-online { background: var(--green); box-shadow: 0 0 5px var(--green); }

/* ── UPDATED WEATHER OVERLAY (v1.4.3) ── */
#weatherOverlay {
  position: fixed; inset: 0; background: rgba(5, 8, 15, 0.98); z-index: 1000; display: none; flex-direction: column; padding: 20px; overflow-y: auto;
}
#weatherOverlay.show { display: flex; }
.prognos-row { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    background: rgba(255,255,255,0.05); 
    margin-bottom: 5px; 
    padding: 12px; 
    border-radius: 12px; 
    border-left: 4px solid var(--accent); 
}
.prognos-time { font-weight: 900; min-width: 50px; font-size: 14px; }
.prognos-icon { font-size: 20px; min-width: 30px; text-align: center; }
.prognos-wind { flex: 1; font-weight: 800; }
.prognos-temp { font-weight: 700; color: var(--muted); }
.prognos-arrow { display: flex; align-items: center; justify-content: center; }

@media (max-width: 950px) {
  body { overflow-y: auto; }
  .dashboard { display: flex; flex-direction: column; height: auto; }
  #btnGrid { grid-template-columns: repeat(3, 1fr); width: 100%; margin-bottom: 15px; }
  .tile { width: 100%; margin-bottom: 12px; min-height: 180px; }
}
</style>
</head>
<body>

<div class="dashboard">
  <div id="btnGrid"></div>

  <div class="tile tile-speed">
    <div class="tile-title">Fart (Knop)</div>
    <svg class="speedo-svg" viewBox="0 0 72 44" xmlns="http://www.w3.org/2000/svg">
        <path d="M 8 32 A 28 28 0 0 1 64 32" fill="none" stroke="#1e2d47" stroke-width="6" stroke-linecap="round"/>
        <line id="speedNeedle" x1="36" y1="32" x2="12" y2="32" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
        <circle cx="36" cy="32" r="5" fill="#3B82F6"/>
    </svg>
    <div id="speedValDisplay">0.0 kn</div>
  </div>

  <div class="tile tile-env" onclick="toggleWeather(true)">
    <div class="tile-title">Vatten & Vind (48h)</div>
    <div class="water-val" id="waterDisplay">-- cm</div>
    <div class="wind-box">
        <div style="display: flex; align-items: center; gap: 8px;">
            <div id="mainWeatherIcon" style="font-size: 24px;">☀️</div>
            <div style="display: flex; flex-direction: column;">
                <div id="windMain" style="font-size: 18px; font-weight: 900;">-- m/s</div>
                <div id="windGusts" style="font-size: 11px; font-weight: 700; color: #718096;">Byar: --</div>
            </div>
        </div>
        <div id="windDir" style="transition: transform 0.5s;"><svg width="24" height="24" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="#3B82F6"/></svg></div>
    </div>
  </div>

  <div class="tile tile-log">
    <div class="tile-title">Senaste logg</div>
    <div id="departureLog" style="overflow-y: auto; width: 100%; font-size: 11px;"></div>
  </div>
</div>

<div class="sys-status">
    <div style="display: flex; align-items: center;">
        <div id="syncDot" class="status-dot"></div>
        <span id="syncText">V1.4.3-B</span>
    </div>
    <div id="gpsStatus">GPS: SÖKER...</div>
</div>

<div id="weatherOverlay">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center;">
        <h2>48h Prognos (Pettu)</h2>
        <button onclick="toggleWeather(false)" style="color:white; background:var(--surface); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 12px; font-weight: 800;">STÄNG ✕</button>
    </div>
    <div id="prognosContent"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
  authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare",
  databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

const CATS = [
  { id: 'personbil',  label: 'Bil', emoji: '🚗', color: '#1D4ED8' },
  { id: 'paketbil',   label: 'Paket', emoji: '🚐', color: '#6D28D9' },
  { id: 'lastbil',    label: 'Lastbil', emoji: '🚛', color: '#B91C1C' },
  { id: 'traktor',    label: 'Traktor', emoji: '🚜', color: '#92400E' },
  { id: 'cykel',      label: 'Cykel', emoji: '🚲', color: '#065F46' },
  { id: 'mc',         label: 'MC', emoji: '🏍️', color: '#C2410C' },
  { id: 'fotgangare', label: 'Gående', emoji: '🚶', color: '#0E7490' },
  { id: 'moped',      label: 'Moped', emoji: '🛵', color: '#9D174D' },
  { id: 'fyrhjuling', label: 'ATV', emoji: '🏎️', color: '#3730A3' },
];

var db, logsRef, tripsRef, fullWeatherData;

// ── WEATHER HELPERS (v1.4.3) ──
function getWeatherIcon(code, timeStr, temp) {
    const hour = parseInt(timeStr.slice(0, 2));
    const isNight = hour < 6 || hour > 22;
    
    if (temp < -15) return "🥶"; // Apkallt!
    
    // WMO Weather interpretation codes
    if (code === 0) return isNight ? "🌙" : "☀️"; // Klart
    if (code >= 1 && code <= 3) return isNight ? "☁️" : "🌤️"; // Molnigt
    if (code >= 45 && code <= 48) return "🌫️"; // Dimma
    if (code >= 51 && code <= 67) return "🌧️"; // Regn
    if (code >= 71 && code <= 77) return "❄️"; // Snö
    if (code >= 80 && code <= 82) return "🌦️"; // Skurar
    if (code >= 85 && code <= 86) return "🌨️"; // Snöbyar
    if (code >= 95) return "⛈️"; // Åska
    return "🌡️";
}

function getWindColor(speed) {
    if (speed < 6) return "#10B981";
    if (speed < 12) return "#F59E0B";
    return "#EF4444"; // Storm/Hård vind
}

document.addEventListener('DOMContentLoaded', function() {
  const grid = document.getElementById('btnGrid');
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'v-btn';
    btn.style.backgroundColor = cat.color;
    btn.innerHTML = `<span class="v-btn-badge" id="b_${cat.id}">0</span><span class="v-btn-emoji">${cat.emoji}</span><span class="v-btn-label">${cat.label}</span>`;
    btn.onclick = () => {
        if (navigator.vibrate) navigator.vibrate(25);
        if (logsRef) logsRef.push({ type: cat.id, ts: Date.now(), delta: 1 });
    };
    grid.appendChild(btn);
  });
  initApp();
  fetchWeather();
  setInterval(fetchWeather, 1000 * 60 * 30);
});

function initApp() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    var today = new Date().toISOString().slice(0, 10);
    logsRef = db.ref('days/' + today + '/logs');
    tripsRef = db.ref('turer/' + today);

    db.ref('.info/connected').on('value', snap => {
        const dot = document.getElementById('syncDot');
        if (snap.val() === true) dot.classList.add('dot-online');
        else dot.classList.remove('dot-online');
    });

    logsRef.on('value', snap => {
      const logs = snap.val() || {};
      const c = {};
      Object.values(logs).forEach(l => { c[l.type] = (c[l.type] || 0) + (l.delta || 1); });
      CATS.forEach(cat => {
          const badge = document.getElementById('b_' + cat.id);
          if (badge) badge.textContent = Math.max(0, c[cat.id] || 0);
      });
    });

    tripsRef.on('value', snap => {
      const trips = snap.val() || {};
      const logDiv = document.getElementById('departureLog');
      const sorted = Object.values(trips).sort((a,b) => b.ts - a.ts).slice(0,5);
      if (logDiv) logDiv.innerHTML = sorted.map(t => {
          const time = new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
          return `<div class="dep-row"><span>${time}</span><span>${t.from || 'Avgång'}</span></div>`;
      }).join('');
    });

    db.ref('config/watlev').on('value', snap => {
      const data = snap.val();
      if (data) document.getElementById('waterDisplay').textContent = (data.value > 0 ? '+' : '') + data.value + ' cm';
    });

    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(pos => {
        const kn = (pos.coords.speed || 0) * 1.94384;
        const angle = (Math.min(kn, 6) / 6 * 180).toFixed(1);
        document.getElementById('speedNeedle').setAttribute('transform', `rotate(${angle},36,32)`);
        document.getElementById('speedValDisplay').textContent = kn.toFixed(1) + ' kn';
        document.getElementById('gpsStatus').textContent = "GPS: " + Math.round(pos.coords.accuracy) + "m";
      }, null, { enableHighAccuracy: true });
    }
  } catch (e) { console.error(e); }
}

function toggleWeather(show) {
    document.getElementById('weatherOverlay').classList.toggle('show', show);
    if (show) renderFullForecast();
}

async function fetchWeather() {
    try {
        const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=60.03&longitude=22.92&hourly=windspeed_10m,windgusts_10m,winddirection_10m,temperature_2m,weathercode&wind_speed_unit=ms&timezone=Europe%2FHelsinki`);
        fullWeatherData = await resp.json();
        const hour = new Date().getHours();
        const h = fullWeatherData.hourly;
        
        const speed = h.windspeed_10m[hour];
        document.getElementById('windMain').textContent = speed.toFixed(1) + ' m/s';
        document.getElementById('windMain').style.color = getWindColor(speed);
        document.getElementById('windGusts').textContent = 'Byar: ' + h.windgusts_10m[hour].toFixed(1);
        document.getElementById('windDir').style.transform = `rotate(${(h.winddirection_10m[hour] + 180) % 360}deg)`;
        
        // Update main icon
        const time = h.time[hour].slice(11, 16);
        document.getElementById('mainWeatherIcon').textContent = getWeatherIcon(h.weathercode[hour], time, h.temperature_2m[hour]);
    } catch (e) { console.error(e); }
}

function renderFullForecast() {
    const container = document.getElementById('prognosContent');
    if (!fullWeatherData) return;
    let html = "";
    const h = fullWeatherData.hourly;
    const nowIdx = new Date().getHours();

    for (let i = nowIdx; i < h.time.length && i < nowIdx + 48; i++) {
        const time = h.time[i].slice(11, 16);
        const code = h.weathercode[i];
        const temp = h.temperature_2m[i];
        const speed = h.windspeed_10m[i];
        const gusts = h.windgusts_10m[i];
        const dir = h.winddirection_10m[i];
        const color = getWindColor(speed);
        const icon = getWeatherIcon(code, time, temp);
        
        html += `
            <div class="prognos-row" style="border-left-color: ${color}">
                <div class="prognos-time">${time}</div>
                <div class="prognos-icon">${icon}</div>
                <div class="prognos-wind" style="color: ${color}">${speed.toFixed(1)} <small>(${gusts.toFixed(1)})</small> m/s</div>
                <div class="prognos-temp">${temp.toFixed(1)}°C</div>
                <div class="prognos-arrow" style="transform: rotate(${(dir + 180) % 360}deg)">
                    <svg width="20" height="20" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="#718096"/></svg>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}
</script>
</body>
</html>
