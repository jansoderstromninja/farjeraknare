<style>
:root {
  --bg: #05080f;
  --surface: #121a2b;
  --glass: rgba(24, 33, 53, 0.9);
  --glass-border: rgba(255, 255, 255, 0.3);
  --text: #ffffff;
  --accent: #3B82F6;
  --signal-yellow: #FACC15; 
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto; /* Tillåt scroll på mobilen */
  display: flex;
  flex-direction: column;
}

/* ── DASHBOARD GRUND (Desktop/Landskap) ── */
.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 15px;
  padding: 15px;
  flex: 1;
  height: 100vh;
}

.tile {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── POSITIONERING DESKTOP ── */
#btnGrid {
  grid-column: 1 / 3;
  grid-row: 1 / 4;
  display: grid !important;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 12px;
}

.tile-speed { grid-column: 3 / 5; grid-row: 1 / 3; justify-content: center; align-items: center; }
.tile-water { grid-column: 3 / 4; grid-row: 3 / 4; }
.tile-log   { grid-column: 4 / 5; grid-row: 3 / 4; }

/* ── MOBIL-ANPASSNING (FIXEN) ── */
@media (max-width: 900px) {
  .dashboard {
    display: flex; /* Byt från Grid till Flex på mobilen för enklare stapling */
    flex-direction: column;
    height: auto;
    overflow-y: visible;
  }

  #btnGrid {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr); /* Behåll 3 knappar i bredd */
    grid-template-rows: auto;
    width: 100%;
    margin-bottom: 10px;
  }

  .tile-speed, .tile-water, .tile-log {
    width: 100%;
    margin-bottom: 10px;
    min-height: 180px;
  }
  
  .v-btn-emoji { font-size: 32px !important; }
  .v-btn-label { font-size: 11px !important; }
}

/* ── KNAPPAR ── */
.v-btn {
  position: relative;
  aspect-ratio: 1 / 1;
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 0px rgba(0,0,0,0.4);
}
.v-btn:active { transform: translateY(2px); filter: brightness(1.2); }
.v-btn-emoji { font-size: 40px; }
.v-btn-label { font-size: 14px; font-weight: 900; margin-top: 4px; text-transform: uppercase; }

/* ── BADGES ── */
.v-btn-badge {
  position: absolute;
  top: -6px;
  right: -6px;
  background: var(--signal-yellow);
  color: #000;
  padding: 4px 8px;
  border-radius: 10px;
  font-size: 18px;
  font-weight: 900;
  border: 2px solid #000;
  z-index: 10;
}

.tile-title { font-size: 11px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
.dep-row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--glass-border); }
#speedVal { font-size: 22px; font-weight: 900; }
</style>
