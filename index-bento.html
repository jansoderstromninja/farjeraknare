<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknaren BENTO v1.2-B</title>
<style>
/* ── FÄRG & KONTRAST-BAS ── */
:root {
  --bg: #05080f;
  --surface: #121a2b;
  --glass: rgba(24, 33, 53, 0.9);
  --glass-border: rgba(255, 255, 255, 0.2);
  --text: #ffffff;
  --muted: #a0b4cc;
  --accent: #3B82F6;
  --signal-yellow: #FACC15; /* Maximal kontrast mot mörkt */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── BENTO DASHBOARD LAYOUT ── */
.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 15px;
  padding: 15px;
  flex: 1;
}

.tile {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.tile-title {
  font-size: 13px;
  font-weight: 900;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 15px;
}

/* ── KONTROLLER (VÄNSTER 50%) ── */
.tile-main-controls {
  grid-column: 1 / 3;
  grid-row: 1 / 4;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 12px;
}

/* ── SPEEDOMETER (UPPE HÖGER) ── */
.tile-speed {
  grid-column: 3 / 5;
  grid-row: 1 / 3;
  justify-content: center;
  align-items: center;
}

/* ── VATTEN & LOGG (NERE HÖGER) ── */
.tile-water { grid-column: 3 / 4; grid-row: 3 / 4; }
.tile-log { grid-column: 4 / 5; grid-row: 3 / 4; }

/* ── HÖGKONTRAST-KNAPPAR ── */
.v-btn {
  position: relative;
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s, filter 0.1s;
  box-shadow: 0 6px 0px rgba(0,0,0,0.4);
}

.v-btn:active { 
  transform: translateY(3px); 
  filter: brightness(1.3);
  border-color: #fff;
}

.v-btn-emoji { 
  font-size: 44px; 
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

.v-btn-label { 
  font-size: 16px; 
  font-weight: 900; 
  margin-top: 6px; 
  color: #fff;
  text-transform: uppercase;
  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

/* ── SIGNAL-GULA BADGES (FIXEN) ── */
.v-btn-badge {
  position: absolute;
  top: -10px;
  right: -10px;
  background: var(--signal-yellow);
  color: #000; /* Svart på gult = bäst läsbarhet */
  padding: 6px 12px;
  border-radius: 14px;
  font-size: 22px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  box-shadow: 0 4px 10px rgba(0,0,0,0.6);
  border: 2px solid #000;
  z-index: 10;
}

/* ── LOGG & STATUS ── */
.dep-row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--glass-border);
  font-weight: 600;
}
.dep-time { color: var(--muted); }

#speedVal { font-size: 18px; font-weight: 900; fill: #fff; }

</style>
</head>
