<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknare BENTO v1.3.7</title>
<style>
/* ── FÄRGER & BAS ── */
:root {
  --bg: #05080f;
  --surface: #121a2b;
  --glass: rgba(24, 33, 53, 0.95);
  --glass-border: rgba(255, 255, 255, 0.3);
  --text: #ffffff;
  --accent: #3B82F6;
  --signal-yellow: #FACC15; 
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── DASHBOARD LAYOUT (3-KOLUMNER) ── */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr; 
  grid-template-rows: repeat(3, 1fr);
  gap: 15px;
  padding: 15px;
  flex: 1;
}

.tile {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ── POSITIONERING ── */
#btnGrid {
  grid-column: 1 / 3;
  grid-row: 1 / 4;
  display: grid !important;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 12px;
}

.tile-speed { 
  grid-column: 3 / 4; 
  grid-row: 1 / 2; 
  align-items: center;
  justify-content: flex-start; /* Startar från toppen */
}

.tile-water { grid-column: 3 / 4; grid-row: 2 / 3; justify-content: center; align-items: center; }
.tile-log { grid-column: 3 / 4; grid-row: 3 / 4; }

/* ── MOBIL-ANPASSNING ── */
@media (max-width: 950px) {
  body { overflow-y: auto; }
  .dashboard { display: flex; flex-direction: column; height: auto; }
  #btnGrid { grid-template-columns: repeat(3, 1fr); width: 100%; margin-bottom: 15px; }
  .tile { width: 100%; margin-bottom: 12px; min-height: 200px; }
}

/* ── KNAPPAR ── */
.v-btn {
  position: relative;
  width: 100%; height: 100%;
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 6px 0px rgba(0,0,0,0.4);
}
.v-btn:active { transform: translateY(3px); filter: brightness(1.2); }
.v-btn-emoji { font-size: clamp(24px, 6vh, 48px); }
.v-btn-label { font-size: clamp(10px, 1.8vh, 14px); font-weight: 900; margin-top: 4px; text-transform: uppercase; }

.v-btn-badge {
  position: absolute;
  top: -8px; right: -8px;
  background: var(--signal-yellow);
  color: #000;
  padding: 5px 10px;
  border-radius: 12px;
  font-size: clamp(14px, 2.2vh, 20px);
  font-weight: 900;
  border: 2px solid #000;
  z-index: 10;
}

/* ── SPEEDOMETER FIX ── */
.tile-title { 
  font-size: 11px; 
  font-weight: 900; 
  color: var(--accent); 
  text-transform: uppercase; 
  margin-bottom: 15px; /* Ger luft under titeln */
  width: 100%; 
  text-align: left; 
}

/* SVG:n får en fast plats under titeln */
.speedo-svg {
  width: 100%;
  height: auto;
  max-height: 120px;
  margin-bottom: 10px;
}

#speedValDisplay { 
  font-size: 34px; 
  font-weight: 900; 
  color: #fff;
  letter-spacing: -1px;
}

/* Vattenmätare */
#waterDisplay { font-size: 42px; font-weight: 900; color: #10B981; }

.dep-row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--glass-border); }
</style>
</head>
<body>

<div class="dashboard">
  <!-- KNAPPAR -->
  <div id="btnGrid"></div>

  <!-- SPEEDOMETER -->
  <div class="tile tile-speed">
    <div class="tile-title">Fart (Knop)</div>
    
    <!-- Den grafiska mätaren -->
    <svg class="speedo-svg" viewBox="0 0 72 44" xmlns="http://www.w3.org/2000/svg">
        <!-- Grå båge -->
        <path d="M 8 32 A 28 28 0 0 1 64 32" fill="none" stroke="#1e2d47" stroke-width="6" stroke-linecap="round"/>
        <!-- Nål -->
        <line id="speedNeedle" x1="36" y1="32" x2="12" y2="32" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
        <circle cx="36" cy="32" r="5" fill="#3B82F6"/>
    </svg>

    <!-- Den digitala siffran i botten -->
    <div id="speedValDisplay">0.0 kn</div>
  </div>

  <!-- VATTEN -->
  <div class="tile tile-water">
    <div class="tile-title">Vatten</div>
    <div id="waterDisplay">-- cm</div>
  </div>

  <!-- LOGG -->
  <div class="tile tile-log">
    <div class="tile-title">Logg</div>
    <div id="departureLog" style="overflow-y: auto; width: 100%;"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
  authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare",
  databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

const CATS = [
  { id: 'personbil',  label: 'Bil', emoji: '🚗', color: '#1D4ED8' },
  { id: 'paketbil',   label: 'Paket', emoji: '🚐', color: '#6D28D9' },
  { id: 'lastbil',    label: 'Lastbil', emoji: '🚛', color: '#B91C1C' },
  { id: 'traktor',    label: 'Traktor', emoji: '🚜', color: '#92400E' },
  { id: 'cykel',      label: 'Cykel', emoji: '🚲', color: '#065F46' },
  { id: 'mc',         label: 'MC', emoji: '🏍️', color: '#C2410C' },
  { id: 'fotgangare', label: 'Gående', emoji: '🚶', color: '#0E7490' },
  { id: 'moped',      label: 'Moped', emoji: '🛵', color: '#9D174D' },
  { id: 'fyrhjuling', label: 'ATV', emoji: '🏎️', color: '#3730A3' },
];

var db, logsRef, tripsRef;

document.addEventListener('DOMContentLoaded', function() {
  const grid = document.getElementById('btnGrid');
  if (grid) {
      CATS.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'v-btn';
        btn.style.backgroundColor = cat.color;
        btn.innerHTML = `<span class="v-btn-badge" id="b_${cat.id}">0</span><span class="v-btn-emoji">${cat.emoji}</span><span class="v-btn-label">${cat.label}</span>`;
        btn.onclick = () => {
            if (navigator.vibrate) navigator.vibrate(25);
            if (logsRef) logsRef.push({ type: cat.id, ts: Date.now(), delta: 1 });
        };
        grid.appendChild(btn);
      });
  }
  initApp();
});

function initApp() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    var today = new Date().toISOString().slice(0, 10);
    logsRef = db.ref('days/' + today + '/logs');
    tripsRef = db.ref('turer/' + today);

    logsRef.on('value', snap => {
      const logs = snap.val() || {};
      const c = {};
      Object.values(logs).forEach(l => { c[l.type] = (c[l.type] || 0) + (l.delta || 1); });
      CATS.forEach(cat => {
          const badge = document.getElementById('b_' + cat.id);
          if (badge) badge.textContent = Math.max(0, c[cat.id] || 0);
      });
    });

    tripsRef.on('value', snap => {
      const trips = snap.val() || {};
      const logDiv = document.getElementById('departureLog');
      const sorted = Object.values(trips).sort((a,b) => b.ts - a.ts).slice(0,5);
      if (logDiv) logDiv.innerHTML = sorted.map(t => {
          const time = new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
          return `<div class="dep-row"><span>${time}</span><span>${t.from || 'Avgång'}</span></div>`;
      }).join('');
    });

    db.ref('config/watlev').on('value', snap => {
      const data = snap.val();
      const disp = document.getElementById('waterDisplay');
      if (data && disp) disp.textContent = (data.value > 0 ? '+' : '') + data.value + ' cm';
    });

    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(pos => {
        const kn = (pos.coords.speed || 0) * 1.94384;
        const angle = (Math.min(kn, 6) / 6 * 180).toFixed(1);
        const needle = document.getElementById('speedNeedle');
        if (needle) needle.setAttribute('transform', `rotate(${angle},36,32)`);
        const valDisp = document.getElementById('speedValDisplay');
        if (valDisp) valDisp.textContent = kn.toFixed(1) + ' kn';
      }, null, { enableHighAccuracy: true });
    }
  } catch (e) { console.error("Init-fel:", e); }
}
</script>
</body>
</html>
