<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknaren BENTO</title>
<style>
:root {
  --bg: #05080f;
  --surface: #121a2b;
  --glass: rgba(24, 33, 53, 0.8);
  --glass-border: rgba(255, 255, 255, 0.1);
  --text: #eef2f8;
  --muted: #a0b4cc;
  --accent: #3B82F6;
  --border: #2a3f5e;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* BENTO GRID LAYOUT (Optimerad för Galaxy Tab A8 Landscape) */
.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 12px;
  padding: 12px;
  flex: 1;
}

.tile {
  background: var(--glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  position: relative;
}

.tile-title {
  font-size: 12px;
  font-weight: 800;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 15px;
}

/* KONTROLLER (2x3 rutor på vänster sida) */
.tile-main-controls {
  grid-column: 1 / 3;
  grid-row: 1 / 4;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 12px;
}

/* SPEEDO (Högst upp till höger) */
.tile-speed {
  grid-column: 3 / 5;
  grid-row: 1 / 3;
  justify-content: center;
  align-items: center;
}

/* VATTEN & LOGG (Nere till höger) */
.tile-water { grid-column: 3 / 4; grid-row: 3 / 4; }
.tile-log { grid-column: 4 / 5; grid-row: 3 / 4; overflow-y: auto; }

/* KNAPPAR */
.v-btn {
  position: relative;
  border: none;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s, filter 0.1s;
}
.v-btn:active { transform: scale(0.92); filter: brightness(1.2); }
.v-btn-emoji { font-size: 40px; }
.v-btn-label { font-size: 16px; font-weight: 800; margin-top: 6px; color: white; }
.v-btn-badge {
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(0,0,0,0.6);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 900;
}

/* LOGG-RADER */
.dep-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px solid var(--glass-border);
}
.dep-time { color: var(--muted); font-weight: 700; }

/* SPEEDOMETER */
#speedVal { font-size: 16px; font-weight: 900; }
</style>
</head>
<body>

<div class="dashboard">
  <!-- KNAPPAR -->
  <div class="tile tile-main-controls" id="btnGrid"></div>

  <!-- SPEEDOMETER -->
  <div class="tile tile-speed">
    <div class="tile-title">Fart (Knop)</div>
    <svg viewBox="0 0 72 44" width="100%" height="100%" style="max-height: 250px;">
        <path d="M 8 32 A 28 28 0 0 1 64 32" fill="none" stroke="#1e2d47" stroke-width="5" stroke-linecap="round"/>
        <line id="speedNeedle" x1="36" y1="32" x2="12" y2="32" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
        <circle cx="36" cy="32" r="3" fill="#3B82F6"/>
        <text id="speedVal" x="36" y="43" text-anchor="middle" fill="white">0.0 kn</text>
    </svg>
  </div>

  <!-- VATTENSTÅND -->
  <div class="tile tile-water">
    <div class="tile-title">Vattenstånd</div>
    <div id="waterDisplay" style="font-size: 32px; font-weight: 900; color: #10B981;">-- cm</div>
    <div id="waterTrend" style="font-size: 14px; color: var(--muted); margin-top: 5px;">Hämtar...</div>
  </div>

  <!-- LOGG -->
  <div class="tile tile-log">
    <div class="tile-title">Senaste logg</div>
    <div id="departureLog"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
// ── KONFIG & DATA ──
const CATS = [
  { id: 'personbil',  label: 'Bil', emoji: '🚗', color: '#1D4ED8' },
  { id: 'paketbil',   label: 'Paket', emoji: '🚐', color: '#6D28D9' },
  { id: 'lastbil',    label: 'Lastbil', emoji: '🚛', color: '#B91C1C' },
  { id: 'traktor',    label: 'Traktor', emoji: '🚜', color: '#92400E' },
  { id: 'cykel',      label: 'Cykel', emoji: '🚲', color: '#065F46' },
  { id: 'mc',         label: 'MC', emoji: '🏍️', color: '#C2410C' },
  { id: 'fotgangare', label: 'Gående', emoji: '🚶', color: '#0E7490' },
  { id: 'moped',      label: 'Moped', emoji: '🛵', color: '#9D174D' },
  { id: 'fyrhjuling', label: 'ATV', emoji: '🏎️', color: '#3730A3' },
];

const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
  authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare",
  databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

// ── MOTOR ──
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const today = new Date().toISOString().slice(0, 10);
const logsRef = db.ref('days/' + today + '/logs');
const tripsRef = db.ref('turer/' + today);

// Firebase Lyssnare
logsRef.on('value', snap => {
    const logs = snap.val() || {};
    const c = {};
    Object.values(logs).forEach(l => {
        c[l.type] = (c[l.type] || 0) + (l.delta || 1);
    });
    CATS.forEach(cat => {
        const badge = document.getElementById('b_' + cat.id);
        if (badge) badge.textContent = Math.max(0, c[cat.id] || 0);
    });
});

tripsRef.on('value', snap => {
    const trips = snap.val() || {};
    const log = document.getElementById('departureLog');
    const sorted = Object.values(trips).sort((a,b) => b.ts - a.ts).slice(0,5);
    log.innerHTML = sorted.map(t => {
        const time = new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        return `<div class="dep-row"><span class="dep-time">${time}</span><span>${t.from || 'Avgång'}</span></div>`;
    }).join('');
});

db.ref('config/watlev').on('value', snap => {
    const data = snap.val();
    if (data) document.getElementById('waterDisplay').textContent = (data.value > 0 ? '+' : '') + data.value + ' cm';
});

// Skapa knappar
const grid = document.getElementById('btnGrid');
CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'v-btn';
    btn.style.backgroundColor = cat.color;
    btn.innerHTML = `<span class="v-btn-badge" id="b_${cat.id}">0</span><span class="v-btn-emoji">${cat.emoji}</span><span class="v-btn-label">${cat.label}</span>`;
    btn.onclick = () => {
        if (navigator.vibrate) navigator.vibrate(15);
        logsRef.push({ type: cat.id, ts: Date.now(), delta: 1 });
    };
    grid.appendChild(btn);
});

// Speedometer (Hög precision)
navigator.geolocation.watchPosition(pos => {
    const kn = (pos.coords.speed || 0) * 1.94384;
    const angle = (Math.min(kn, 6) / 6 * 180).toFixed(1);
    document.getElementById('speedNeedle').setAttribute('transform', `rotate(${angle},36,32)`);
    document.getElementById('speedVal').textContent = kn.toFixed(1) + ' kn';
}, null, { enableHighAccuracy: true });

</script>
</body>
</html>
