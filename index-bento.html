<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknare TACTICAL v1.6.5</title>
<style>
:root {
  --bg: #000000;
  --panel: #161b22; 
  --border: #30363d;
  --text: #ffffff;
  --accent: #ff3b30; 
  --safe: #10B981;   
  --dim: #8b949e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* ── CHROME SCROLLBAR (Tactical Style) ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

body {
  background: var(--bg); color: var(--text);
  font-family: 'SF Mono', 'Roboto Mono', monospace;
  height: 100dvh; width: 100vw;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ── DASHBOARD GRID ── */
.dashboard {
  display: grid; 
  grid-template-columns: 1fr 1fr 1.2fr;
  grid-template-rows: 1fr 1fr 1fr;
  gap: 10px; padding: 10px; flex: 1;
}

.tile {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 15px; display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

.tile-header {
    font-size: 10px; font-weight: 800; color: var(--accent);
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 8px; border-bottom: 1px solid var(--border);
    padding-bottom: 5px; display: flex; justify-content: space-between;
}

#btnGrid {
  grid-column: 1 / 3; grid-row: 1 / 4;
  display: grid !important; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 8px;
}

.tile-speed { grid-column: 3 / 4; grid-row: 1 / 2; justify-content: center; align-items: center; }
.tile-env   { grid-column: 3 / 4; grid-row: 2 / 3; cursor: pointer; }
.tile-log   { grid-column: 3 / 4; grid-row: 3 / 4; cursor: pointer; }

/* KNAPPAR - 65PX IKONER */
.v-btn {
  position: relative; width: 100%; height: 100%; 
  border: 1px solid var(--border); background: #0d1117;
  border-radius: 8px; display: flex; flex-direction: column; 
  align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.1s;
}
.v-btn:active { background: #21262d; transform: scale(0.97); }
.v-btn.removing { background-color: var(--accent) !important; }

.v-btn-emoji { font-size: clamp(45px, 8vh, 65px); margin-bottom: 2px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
.v-btn-label { font-size: 12px; font-weight: 800; color: #fff; text-transform: uppercase; }

.v-btn-badge {
  position: absolute; top: 8px; right: 8px; 
  background: var(--bg); color: var(--accent);
  padding: 2px 8px; border: 1px solid var(--accent);
  border-radius: 6px; font-size: 16px; font-weight: 900;
}

/* ── OVERLAYS (ULTIMATE CHROME FIX) ── */
.overlay {
  position: fixed; inset: 0;
  height: 100dvh; width: 100vw;
  background: #000000; z-index: 2000;
  display: none; flex-direction: column;
  contain: content; /* Isolerar rutan för bättre prestanda i Chrome */
}
.overlay.show { display: flex; }

.overlay-hdr-fixed {
  flex-shrink: 0; padding: 25px; background: #000;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}

.overlay-scroll-area {
  flex: 1; 
  overflow-y: auto !important; 
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch; 
  padding: 20px;
  /* Säkerställ att Chrome fattar att innehållet kan vara långt */
  display: block; 
  min-height: 0; 
}

.prognos-row {
  display: flex; align-items: center; gap: 12px; 
  background: var(--panel); margin-bottom: 8px; padding: 15px;
  border: 1px solid var(--border); border-left: 5px solid var(--accent);
  border-radius: 4px;
}

/* ── ELEMENTS ── */
.speedo-wrap { width: 100%; position: relative; display: flex; justify-content: center; }
.speedo-num { font-size: 64px; font-weight: 300; }
.water-display { font-size: 38px; font-weight: 300; color: var(--safe); }
.dep-row { display: flex; justify-content: space-between; font-size: 12px; padding: 8px 0; border-bottom: 1px solid #111; color: var(--dim); }

.sys-bar {
  height: 25px; background: #000; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 15px; font-size: 9px; font-weight: 800; color: var(--dim);
}

  body { overflow-y: auto; }

  #btnGrid { grid-template-columns: repeat(3, 1fr); min-height: 500px; }
