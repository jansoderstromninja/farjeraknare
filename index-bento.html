<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknare TACTICAL BENTO v1.6.0</title>
<style>
:root {
  --bg: #000000;
  --panel: #0a0c14;
  --border: #1e2d47;
  --text: #ffffff;
  --accent: #ff3b30; /* Tactical Red */
  --safe: #10B981;   /* Signal Green */
  --warning: #FACC15; /* Signal Yellow */
  --dim: #4a5568;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'SF Mono', 'Roboto Mono', 'Cascadia Code', monospace;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── TACTICAL BENTO GRID ── */
.dashboard {
  display: grid; 
  grid-template-columns: 1fr 1fr 1.2fr; /* Bredare högerkolumn för mätaren */
  grid-template-rows: 1fr 1fr 1fr;
  gap: 8px; padding: 8px; flex: 1;
}

.tile {
  background: var(--panel); 
  border: 1px solid var(--border);
  border-radius: 12px; /* Skarpare hörn för industriell look */
  padding: 15px; display: flex; flex-direction: column;
  position: relative;
}

.tile-header {
    font-size: 10px; font-weight: 800; color: var(--accent);
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 10px; border-bottom: 1px solid var(--border);
    padding-bottom: 5px; display: flex; justify-content: space-between;
}

/* ── KONTROLLER (VÄNSTER + MITTEN) ── */
#btnGrid {
  grid-column: 1 / 3; grid-row: 1 / 4;
  display: grid !important; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 6px;
}

/* ── TACTICAL SPEEDO (UPPE HÖGER) ── */
.tile-speed { 
    grid-column: 3 / 4; grid-row: 1 / 2; 
    justify-content: center; align-items: center;
    background: radial-gradient(circle at center, #0a0c14 0%, #000 100%);
}

.tile-env { grid-column: 3 / 4; grid-row: 2 / 3; cursor: pointer; }
.tile-log { grid-column: 3 / 4; grid-row: 3 / 4; cursor: pointer; }

/* ── TACTICAL BUTTONS ── */
.v-btn {
  position: relative; width: 100%; height: 100%; 
  border: 1px solid var(--border);
  background: #050505;
  border-radius: 8px; display: flex; flex-direction: column; 
  align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.1s;
}
.v-btn:active { background: #1a1a1a; transform: scale(0.98); border-color: var(--accent); }
.v-btn.removing { background-color: var(--accent) !important; color: #000; }

.v-btn-emoji { font-size: 48px; margin-bottom: 5px; }
.v-btn-label { font-size: 12px; font-weight: 800; color: var(--dim); text-transform: uppercase; }

.v-btn-badge {
  position: absolute; top: 5px; right: 5px; 
  background: var(--bg); color: var(--accent);
  padding: 2px 8px; border: 1px solid var(--accent);
  border-radius: 4px; font-size: 16px; font-weight: 900;
}

/* ── MEGA SPEEDO ARC (v1.6.0) ── */
.speedo-wrap { width: 100%; position: relative; display: flex; justify-content: center; }
.speedo-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%); text-align: center; }
.speedo-num { font-size: 72px; font-weight: 300; line-height: 0.8; }
.speedo-unit { font-size: 14px; font-weight: 900; color: var(--accent); display: block; margin-top: 5px; }

/* ── ENV & LOG ── */
.water-display { font-size: 38px; font-weight: 300; color: var(--safe); }
.wind-row-t { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

.dep-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid #111; color: var(--dim); }
.dep-row span:first-child { color: var(--text); font-weight: 800; }

/* ── TELEMETRY SYSTEM BAR ── */
.sys-bar {
  height: 25px; background: #000; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 15px; font-size: 9px; font-weight: 800; color: var(--dim);
}
.status-item { display: flex; align-items: center; gap: 5px; }
.dot { width: 6px; height: 6px; border-radius: 1px; background: #222; }
.dot-on { background: var(--safe); box-shadow: 0 0 5px var(--safe); }

@media (max-width: 950px) {
  body { overflow-y: auto; }
  .dashboard { display: flex; flex-direction: column; height: auto; }
  #btnGrid { grid-template-columns: repeat(3, 1fr); min-height: 400px; }
  .tile { min-height: 180px; margin-bottom: 5px; }
}
</style>
</head>
<body>

<div class="dashboard">
  <!-- PRIMARY CONTROLS -->
  <div id="btnGrid"></div>

  <!-- TACTICAL SPEEDOMETER -->
  <div class="tile tile-speed" onclick="toggleOverlay('navOverlay', true)">
    <div class="tile-header"><span>VELOCITY / TACTICAL</span><span id="miniAcc">GPS: --</span></div>
    <div class="speedo-wrap">
        <svg viewBox="0 0 200 120" width="100%">
            <!-- Segmented Arc Background -->
            <path d="M 40 100 A 70 70 0 1 1 160 100" fill="none" stroke="#111" stroke-width="12" stroke-dasharray="8 2"/>
            <!-- Live Speed Segment -->
            <path id="speedArc" d="M 40 100 A 70 70 0 1 1 160 100" fill="none" stroke="var(--accent)" stroke-width="12" stroke-dasharray="0 1000" style="transition: stroke-dasharray 0.4s ease-out;"/>
        </svg>
        <div class="speedo-val">
            <span class="speedo-num" id="mainSpeedNum">0</span>
            <span class="speedo-unit">KNOTS</span>
        </div>
    </div>
  </div>

  <!-- ENV MONITOR -->
  <div class="tile tile-env" onclick="toggleOverlay('weatherOverlay', true)">
    <div class="tile-header">ENVIRONMENT / HANGÖ</div>
    <div class="water-display" id="waterDisplay">-- CM</div>
    <div class="wind-row-t">
        <div style="display: flex; align-items: center; gap: 8px;">
            <span id="mainWeatherIcon" style="font-size: 20px;">☀️</span>
            <span id="windMain" style="font-weight: 800;">-- M/S</span>
        </div>
        <div id="windDir"><svg width="20" height="20" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="var(--accent)"/></svg></div>
    </div>
  </div>

  <!-- MISSION LOG -->
  <div class="tile tile-log" onclick="toggleOverlay('statsOverlay', true)">
    <div class="tile-header">MISSION LOG / STATS</div>
    <div id="departureLog" style="overflow-y: auto; flex: 1;"></div>
  </div>
</div>

<div class="sys-bar">
    <div class="status-item">
        <div id="syncDot" class="dot"></div>
        <span>FIREBASE_READY / v1.6.0-B</span>
    </div>
    <div class="status-item">
        <span>TELEM_GPS:</span>
        <span id="gpsStatusText">SCANNING</span>
    </div>
</div>

<!-- OVERLAYS (Keep logic but update look) -->
<div id="navOverlay" style="position:fixed; inset:0; background:#000; z-index:2000; display:none; flex-direction:column; padding:20px;">
    <div class="tile-header"><span>NAVIGATION_DEEP_DATA</span><button onclick="toggleOverlay('navOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; cursor:pointer; font-weight:800;">CLOSE</button></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div class="tile"><span class="tile-header">MAX_VELOCITY</span><span id="statMaxSpeed" style="font-size:32px; font-weight:300;">0.0 kn</span></div>
        <div class="tile"><span class="tile-header">TOTAL_DISTANCE</span><span id="statDistance" style="font-size:32px; font-weight:300;">0.00 NM</span></div>
    </div>
    <div class="tile" style="margin-top:10px;"><span class="tile-header">COORDINATES</span><span id="statPos" style="color:var(--safe)">--</span></div>
</div>

<div id="weatherOverlay" style="position:fixed; inset:0; background:#000; z-index:2000; display:none; flex-direction:column; padding:20px; overflow-y:auto;">
    <div class="tile-header"><span>METEOROLOGICAL_REPORT_48H</span><button onclick="toggleOverlay('weatherOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; cursor:pointer; font-weight:800;">CLOSE</button></div>
    <div id="prognosContent"></div>
</div>

<div id="statsOverlay" style="position:fixed; inset:0; background:#000; z-index:2000; display:none; flex-direction:column; padding:20px;">
    <div class="tile-header"><span>TRAFFIC_ANALYSIS</span><button onclick="toggleOverlay('statsOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; cursor:pointer; font-weight:800;">CLOSE</button></div>
    <div id="statsContent" style="display:flex; flex-direction:column; gap:10px;">
        <div class="tile"><span class="tile-header">TOTAL_VEHICLES</span><span id="statTotal" style="font-size:48px; font-weight:300; color:var(--accent);">0</span></div>
        <div class="tile"><span class="tile-header">TOTAL_DEPARTURES</span><span id="statTrips" style="font-size:48px; font-weight:300;">0</span></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q", authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare", databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

const CATS = [
  { id: 'personbil',  label: 'Car', emoji: '🚗', color: '#1a1a1a' },
  { id: 'paketbil',   label: 'Van', emoji: '🚐', color: '#1a1a1a' },
  { id: 'lastbil',    label: 'Truck', emoji: '🚛', color: '#1a1a1a' },
  { id: 'traktor',    label: 'Tractor', emoji: '🚜', color: '#1a1a1a' },
  { id: 'cykel',      label: 'Bike', emoji: '🚲', color: '#1a1a1a' },
  { id: 'mc',         label: 'Moto', emoji: '🏍️', color: '#1a1a1a' },
  { id: 'fotgangare', label: 'Walk', emoji: '🚶', color: '#1a1a1a' },
  { id: 'moped',      label: 'Mope', emoji: '🛵', color: '#1a1a1a' },
  { id: 'fyrhjuling', label: 'ATV', emoji: '🏎️', color: '#1a1a1a' }
];

var db, logsRef, tripsRef, fullWeatherData;
var currentLogs = {}, currentTrips = {};
var maxSpeedKn = 0, totalDistanceNM = 0, lastLat = null, lastLon = null;

// ── TACTICAL LOGIC ──
function toggleOverlay(id, show) {
    document.getElementById(id).style.display = show ? 'flex' : 'none';
    if (show && id === 'statsOverlay') calculateStats();
    if (show && id === 'weatherOverlay') renderFullForecast();
}

function calculateStats() {
    const logs = Object.values(currentLogs);
    document.getElementById('statTotal').textContent = logs.reduce((sum, l) => sum + (l.delta || 1), 0);
    document.getElementById('statTrips').textContent = Object.values(currentTrips).length;
}

function handleTap(id, btn) {
    if (navigator.vibrate) navigator.vibrate(20);
    if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: 1 });
}

function handleUndo(id, btn) {
    btn.classList.add('removing');
    if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
    setTimeout(() => btn.classList.remove('removing'), 1500);
    if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: -1 });
}

document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('btnGrid');
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'v-btn';
    btn.innerHTML = `<span class="v-btn-badge" id="b_${cat.id}">0</span><span class="v-btn-emoji">${cat.emoji}</span><span class="v-btn-label">${cat.label}</span>`;
    
    let timer;
    btn.onpointerdown = () => timer = setTimeout(() => handleUndo(cat.id, btn), 800);
    btn.onpointerup = () => clearTimeout(timer);
    btn.onclick = () => { if(!btn.classList.contains('removing')) handleTap(cat.id, btn); };
    grid.appendChild(btn);
  });

  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  const today = new Date().toISOString().slice(0, 10);
  logsRef = db.ref('days/' + today + '/logs');
  tripsRef = db.ref('turer/' + today);

  db.ref('.info/connected').on('value', s => document.getElementById('syncDot').classList.toggle('dot-on', s.val() === true));

  logsRef.on('value', snap => {
    currentLogs = snap.val() || {};
    CATS.forEach(cat => {
        let count = 0; Object.values(currentLogs).forEach(l => { if(l.type === cat.id) count += (l.delta || 1); });
        document.getElementById('b_' + cat.id).textContent = Math.max(0, count);
    });
  });

  tripsRef.on('value', snap => {
    currentTrips = snap.val() || {};
    const sorted = Object.values(currentTrips).sort((a,b) => b.ts - a.ts).slice(0,4);
    document.getElementById('departureLog').innerHTML = sorted.map(t => `<div class="dep-row"><span>${new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'})}</span><span>${t.from || '---'}</span></div>`).join('');
  });

  db.ref('config/watlev').on('value', snap => {
    if (snap.val()) document.getElementById('waterDisplay').textContent = (snap.val().value > 0 ? '+' : '') + snap.val().value + ' CM';
  });

  navigator.geolocation.watchPosition(pos => {
    const kn = pos.coords.speed * 1.94384 || 0;
    const acc = pos.coords.accuracy;
    
    // Update Tactical Speedo
    document.getElementById('mainSpeedNum').textContent = kn.toFixed(1);
    const arc = document.getElementById('speedArc');
    const fill = (Math.min(kn, 10) / 10) * 400; // Segmented feel
    arc.style.strokeDasharray = `${fill} 1000`;
    
    document.getElementById('miniAcc').textContent = `GPS: ${Math.round(acc)}M`;
    document.getElementById('gpsStatusText').textContent = acc < 15 ? 'HIGH_PRECISION' : 'SIGNAL_DEGRADED';
    
    if (kn > maxSpeedKn) maxSpeedKn = kn;
    document.getElementById('statMaxSpeed').textContent = maxSpeedKn.toFixed(1) + " kn";
    document.getElementById('statPos').textContent = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
  }, null, { enableHighAccuracy: true });

  fetchWeather();
});

async function fetchWeather() {
    try {
        const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=60.03&longitude=22.92&hourly=windspeed_10m,winddirection_10m,weathercode&wind_speed_unit=ms&timezone=Europe%2FHelsinki`);
        const data = await resp.json();
        const hr = new Date().getHours();
        document.getElementById('windMain').textContent = data.hourly.windspeed_10m[hr].toFixed(1) + ' M/S';
        document.getElementById('windDir').style.transform = `rotate(${(data.hourly.winddirection_10m[hr] + 180) % 360}deg)`;
        fullWeatherData = data;
    } catch (e) {}
}

function renderFullForecast() {
    const container = document.getElementById('prognosContent');
    if (!fullWeatherData) return;
    let html = ""; const h = fullWeatherData.hourly; const now = new Date().getHours();
    for (let i = now; i < now + 48 && i < h.time.length; i++) {
        html += `<div class="prognos-row">
            <div style="font-weight:900; min-width:60px">${h.time[i].slice(11, 16)}</div>
            <div style="flex:1">${h.windspeed_10m[i].toFixed(1)} M/S</div>
        </div>`;
    }
    container.innerHTML = html;
}
</script>
</body>
</html>
