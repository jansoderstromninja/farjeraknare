<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknare TACTICAL v1.7.2</title>
<style>
:root {
  --bg: #000000;
  --panel: #21262d; 
  --border: #3d444d;
  --text: #ffffff;
  --accent: #ff3b30; 
  --safe: #10B981;   
  --dim: #8b949e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'SF Mono', 'Roboto Mono', monospace;
  height: 100dvh; width: 100vw;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ── DASHBOARD GRID ── */
.dashboard {
  display: grid; 
  grid-template-columns: 1fr 1fr 1.2fr;
  grid-template-rows: repeat(3, minmax(0, 1fr)); 
  gap: 10px; padding: 10px; flex: 1;
  min-height: 0;
}

.tile {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: clamp(8px, 1.5vh, 15px); 
  display: flex; flex-direction: column;
  position: relative; overflow: hidden; min-height: 0;
}

.tile-header {
    font-size: 10px; font-weight: 800; color: var(--accent);
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 5px; border-bottom: 1px solid var(--border);
    padding-bottom: 3px; flex-shrink: 0;
}

/* ── KNAPP-GRID ── */
.btn-grid-area {
  grid-column: 1 / 3; grid-row: 1 / 4;
  display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 8px;
}

.tile-speed { grid-column: 3 / 4; grid-row: 1 / 2; justify-content: center; align-items: center; }
.tile-env   { grid-column: 3 / 4; grid-row: 2 / 3; cursor: pointer; justify-content: space-between; }
.tile-log   { grid-column: 3 / 4; grid-row: 3 / 4; cursor: pointer; }

/* KNAPPAR */
.v-btn {
  position: relative; width: 100%; height: 100%; 
  border: 1px solid var(--border); background: var(--panel);
  border-radius: 8px; display: flex; flex-direction: column; 
  align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.05s, background 0.1s;
  min-height: 0; user-select: none;
}
.v-btn:active { background: #30363d; transform: scale(0.97); }
.v-btn.removing { background-color: var(--accent) !important; color: #000; transition: none; }

.v-btn-emoji { font-size: clamp(30px, 7vh, 60px); line-height: 1; margin-bottom: 2px; pointer-events: none; }
.v-btn-label { font-size: clamp(9px, 1.4vh, 12px); font-weight: 800; color: #fff; text-transform: uppercase; pointer-events: none; }

.v-btn-badge {
  position: absolute; top: 5px; right: 5px; 
  background: var(--bg); color: var(--accent);
  padding: 1px 6px; border: 1px solid var(--accent);
  border-radius: 4px; font-size: clamp(10px, 1.8vh, 14px); font-weight: 900; pointer-events: none;
}

/* ── SPEEDO & WATER ── */
.speedo-wrap { width: 100%; position: relative; display: flex; justify-content: center; flex: 1; min-height: 0; }
.speedo-num { font-size: clamp(40px, 9vh, 64px); font-weight: 300; }
.water-display { font-size: clamp(24px, 5vh, 36px); font-weight: 300; color: var(--safe); }

/* ── OVERLAYS ── */
.overlay {
  position: fixed; inset: 0; background: #000; z-index: 2000;
  display: none; flex-direction: column;
}
.overlay.show { display: flex; }
.overlay-hdr-fixed {
  flex-shrink: 0; padding: 20px; background: #000; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.overlay-scroll-area { flex: 1; overflow-y: auto; padding: 15px; }

/* ── WEATHER ROW SYSTEM (FIXED) ── */
.prognos-row {
  display: grid; 
  grid-template-columns: 55px 40px 1fr 65px 35px;
  align-items: center; gap: 10px;
  background: var(--panel); margin-bottom: 5px; padding: 12px;
  border-radius: 4px; border-left: 4px solid var(--accent);
}
.p-time { font-weight: 900; font-size: 14px; }
.p-icon { font-size: 22px; text-align: center; }
.p-wind { font-weight: 800; }
.p-temp { font-weight: 800; text-align: right; color: var(--dim); }
.p-arrow { display: flex; justify-content: center; }

/* ── SYSTEM ── */
.sys-bar {
  height: 25px; background: #000; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 15px; font-size: 9px; font-weight: 800; color: var(--dim); flex-shrink: 0;
}

@media (max-width: 900px) or (orientation: portrait) {
  body { overflow-y: auto; }
  .dashboard { display: flex; flex-direction: column; height: auto; min-height: auto; }
  .btn-grid-area { grid-template-columns: repeat(3, 1fr); height: auto; min-height: 450px; }
  .tile { min-height: 160px; margin-bottom: 5px; overflow: visible; }
}
</style>
</head>
<body>

<div class="dashboard">
  <div class="btn-grid-area">
      <button class="v-btn" id="btn_personbil" onpointerdown="startUndo('personbil', this)" onpointerup="stopUndo()" onpointerleave="stopUndo()" onclick="handleTap('personbil', this)">
          <span class="v-btn-badge" id="b_personbil">0</span><span class="v-btn-emoji">🚗</span><span class="v-btn-label">Bil</span>
      </button>
      <button class="v-btn" id="btn_paketbil" onpointerdown="startUndo('paketbil', this)" onpointerup="stopUndo()" onpointerleave="stopUndo()" onclick="handleTap('paketbil', this)">
          <span class="v-btn-badge" id="b_paketbil">0</span><span class="v-btn-emoji">🚐</span><span class="v-btn-label">Paket</span>
      </button>
      <button class="v-btn" id="btn_lastbil" onpointerdown="startUndo('lastbil', this)" onpointerup="stopUndo()" onpointerleave="stopUndo()" onclick="handleTap('lastbil', this)">
          <span class="v-btn-badge" id="b_lastbil">0</span><span class="v-btn-emoji">🚛</span><span class="v-btn-label">Lastbil</span>
      </button>
      <button class="v-btn" id="btn_traktor" onpointerdown="startUndo('traktor', this)" onpointerup="stopUndo()" onpointerleave="stopUndo()" onclick="handleTap('traktor', this)">
          <span class="v-btn-badge" id="b_traktor">0</span><span class="v-btn-emoji">🚜</span><span class="v-btn-label">Traktor</span>
      </button>
      <button class="v-btn" id="btn_cykel" onpointerdown="startUndo('cykel', this)" onpointerup="stopUndo()" onpointerleave="stopUndo()" onclick="handleTap('cykel', this)">
          <span class="v-btn-badge" id="b_cykel">0</span><span class="v-btn-emoji">🚲</span><span class="v-btn-label">Cykel</span>
      </button>
      <button class="v-btn" id="btn_mc" onpointerdown="startUndo('mc', this)" onpointerup="stopUndo()" onpointerleave="stopUndo()" onclick="handleTap('mc', this)">
          <span class="v-btn-badge" id="b_mc">0</span><span class="v-btn-emoji">🏍️</span><span class="v-btn-label">MC</span>
      </button>
      <button class="v-btn" id="btn_fotgangare" onpointerdown="startUndo('fotgangare', this)" onpointerup="stopUndo()" onpointerleave="stopUndo()" onclick="handleTap('fotgangare', this)">
          <span class="v-btn-badge" id="b_fotgangare">0</span><span class="v-btn-emoji">🚶</span><span class="v-btn-label">Gående</span>
      </button>
      <button class="v-btn" id="btn_moped" onpointerdown="startUndo('moped', this)" onpointerup="stopUndo()" onpointerleave="stopUndo()" onclick="handleTap('moped', this)">
          <span class="v-btn-badge" id="b_moped">0</span><span class="v-btn-emoji">🛵</span><span class="v-btn-label">Moped</span>
      </button>
      <button class="v-btn" id="btn_fyrhjuling" onpointerdown="startUndo('fyrhjuling', this)" onpointerup="stopUndo()" onpointerleave="stopUndo()" onclick="handleTap('fyrhjuling', this)">
          <span class="v-btn-badge" id="b_fyrhjuling">0</span><span class="v-btn-emoji">🏎️</span><span class="v-btn-label">ATV</span>
      </button>
  </div>

  <div class="tile tile-speed" onclick="toggleOverlay('navOverlay', true)">
    <div class="tile-header">VELOCITY / TACTICAL</div>
    <div class="speedo-wrap">
        <svg viewBox="0 0 200 120" style="height: 100%; width: auto;">
            <path d="M 40 100 A 70 70 0 1 1 160 100" fill="none" stroke="#111" stroke-width="12" stroke-dasharray="8 2"/>
            <path id="speedArc" d="M 40 100 A 70 70 0 1 1 160 100" fill="none" stroke="var(--accent)" stroke-width="12" stroke-dasharray="0 1000" />
        </svg>
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -40%); text-align:center;">
            <span class="speedo-num" id="mainSpeedNum">0.0</span>
            <span style="font-size:10px; font-weight:900; color:var(--accent); display:block;">KNOTS</span>
        </div>
    </div>
  </div>

  <div class="tile tile-env" onclick="toggleOverlay('weatherOverlay', true)">
    <div class="tile-header">ENVIRONMENT / HANGÖ</div>
    <div class="water-display" id="waterDisplay">-- CM</div>
    <div style="display:flex; justify-content:space-between; align-items:center; flex: 1;">
        <div style="display:flex; align-items:center; gap:8px;">
            <span id="mainWeatherIcon" style="font-size:24px;">☀️</span>
            <span id="windMain" style="font-weight:800; font-size:18px;">-- M/S</span>
        </div>
        <div id="windDir"><svg width="24" height="24" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="var(--accent)"/></svg></div>
    </div>
  </div>

  <div class="tile tile-log" onclick="toggleOverlay('statsOverlay', true)">
    <div class="tile-header">MISSION SUMMARY</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:5px;">
        <div style="background:rgba(0,0,0,0.3); padding:5px; text-align:center; border-radius:4px;"><span style="font-size:8px; color:var(--dim); display:block;">VEH</span><span id="miniStatTotal" style="font-size:14px; font-weight:800; color:var(--accent);">0</span></div>
        <div style="background:rgba(0,0,0,0.3); padding:5px; text-align:center; border-radius:4px;"><span style="font-size:8px; color:var(--dim); display:block;">DEP</span><span id="miniStatTrips" style="font-size:14px; font-weight:800; color:var(--accent);">0</span></div>
    </div>
    <div id="departureLog" style="flex:1; font-size:11px; overflow: hidden;"></div>
  </div>
</div>

<div class="sys-bar">
    <div style="display:flex; align-items:center;"><div id="syncDot" style="width:6px; height:6px; background:grey; border-radius:1px; margin-right:5px;"></div><span>v1.7.2-B / OPERATIONAL_FIX</span></div>
    <div id="gpsStatusText">GPS_SCANNING</div>
</div>

<!-- OVERLAYS -->
<div id="navOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span>NAVIGATION_DEEP_DATA</span><button onclick="toggleOverlay('navOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800;">CLOSE</button></div>
    <div class="overlay-scroll-area">
        <div class="tile" style="margin-bottom:15px;"><span class="tile-header">MAX_VELOCITY</span><span id="statMaxSpeed" style="font-size:54px;">0.0 kn</span></div>
        <div class="tile" style="margin-bottom:15px;"><span class="tile-header">TOTAL_DISTANCE</span><span id="statDistance" style="font-size:54px;">0.00 NM</span></div>
        <div class="tile"><span class="tile-header">COORDINATES</span><span id="statPos" style="font-size:20px; color:var(--safe)">--</span></div>
    </div>
</div>

<div id="weatherOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span>METEOROLOGICAL_REPORT_48H</span><button onclick="toggleOverlay('weatherOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800;">CLOSE</button></div>
    <div id="prognosContent" class="overlay-scroll-area"></div>
</div>

<div id="statsOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span>TRAFFIC_ANALYSIS</span><button onclick="toggleOverlay('statsOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800;">CLOSE</button></div>
    <div id="statsContent" class="overlay-scroll-area">
        <div class="tile" style="margin-bottom:15px;"><span class="tile-header">TOTAL_VEHICLES</span><div id="statTotalFull" style="font-size:72px; color:var(--safe);">0</div></div>
        <div class="tile"><span class="tile-header">TOTAL_DEPARTURES</span><div id="statTripsFull" style="font-size:72px;">0</div></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q", authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare", databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

var db, logsRef, tripsRef, fullWeatherData, currentLogs = {}, currentTrips = {};
var maxSpeedKn = 0, totalDistanceNM = 0, lastLat = null, lastLon = null;
var undoTimer = null;
var isUndoActive = false;

// ── OPERATIONAL BUTTON LOGIC (FIXED) ──
function handleTap(id, btn) {
    if (isUndoActive) {
        isUndoActive = false;
        return;
    }
    if (navigator.vibrate) navigator.vibrate(20);
    if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: 1 });
}

function startUndo(id, btn) {
    isUndoActive = false;
    undoTimer = setTimeout(() => {
        isUndoActive = true;
        btn.classList.add('removing');
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
        if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: -1 });
        setTimeout(() => btn.classList.remove('removing'), 800);
    }, 800);
}

function stopUndo() {
    clearTimeout(undoTimer);
}

// ── UTILITIES ──
function getCompass(deg) { return ["N", "NO", "O", "SO", "S", "SV", "V", "NV"][Math.round(deg / 45) % 8]; }

function parseFmiRobust(xmlText) {
  try {
    const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
    const bsElements = doc.getElementsByTagNameNS('*', 'BsWfsElement');
    if (bsElements.length > 0) {
      for (let el of bsElements) {
        if (el.getElementsByTagNameNS('*', 'ParameterName')[0]?.textContent === 'WATLEV') 
            return parseFloat(el.getElementsByTagNameNS('*', 'ParameterValue')[0]?.textContent);
      }
    }
  } catch (e) {} return null;
}

async function updateWaterLevel() {
  const start = new Date(Date.now() - 3 * 3600 * 1000).toISOString().slice(0, 19) + 'Z';
  try {
    const resp = await fetch(`https://opendata.fmi.fi/wfs?service=WFS&version=2.0.0&request=getFeature&storedquery_id=fmi::observations::mareograph::instant::simple&fmisid=134253&starttime=${start}`);
    const mm = parseFmiRobust(await resp.text());
    if (mm !== null) {
      const cm = Math.round(mm / 10);
      if (db) db.ref('config/watlev').set({ value: cm, ts: Date.now() });
    }
  } catch (e) {}
}

function getWeatherIcon(code, hour) {
    const isNight = hour < 6 || hour > 22;
    if (code === 0) return isNight ? "🌙" : "☀️";
    if (code <= 3) return isNight ? "☁️" : "🌤️";
    if (code >= 51 && code <= 67) return "🌧️";
    if (code >= 71 && code <= 77) return "❄️";
    return "🌤️";
}

function toggleOverlay(id, show) {
    document.getElementById(id).style.display = show ? 'flex' : 'none';
    if (show && id === 'statsOverlay') calculateStats();
    if (show && id === 'weatherOverlay') renderFullForecast();
}

function calculateStats() {
    const logs = Object.values(currentLogs);
    const total = logs.reduce((sum, l) => sum + (l.delta || 1), 0);
    const tripCount = Object.values(currentTrips).length;
    document.getElementById('miniStatTotal').textContent = total;
    document.getElementById('miniStatTrips').textContent = tripCount;
    if(document.getElementById('statTotalFull')) document.getElementById('statTotalFull').textContent = total;
    if(document.getElementById('statTripsFull')) document.getElementById('statTripsFull').textContent = tripCount;
}

function renderFullForecast() {
    const container = document.getElementById('prognosContent');
    if (!fullWeatherData) return;
    let html = ""; const h = fullWeatherData.hourly; const nowIdx = new Date().getHours();
    for (let i = nowIdx; i < h.time.length && i < nowIdx + 48; i++) {
        const speed = h.windspeed_10m[i];
        const color = speed < 6 ? "#10B981" : speed < 12 ? "#F59E0B" : "#ff3b30";
        const deg = h.winddirection_10m[i];
        const rotation = (deg + 180) % 360;
        
        html += `<div class="prognos-row" style="border-left-color: ${color}">
            <div class="p-time">${h.time[i].slice(11, 16)}</div>
            <div class="p-icon">${getWeatherIcon(h.weathercode[i], parseInt(h.time[i].slice(11,13)))}</div>
            <div class="p-wind" style="color:${color}">${speed.toFixed(1)} m/s</div>
            <div class="p-temp">${h.temperature_2m[i].toFixed(1)}°C</div>
            <div class="p-arrow" style="transform: rotate(${rotation}deg)">
                <svg width="18" height="18" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="${color}"/></svg>
            </div>
        </div>`;
    }
    container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  firebase.initializeApp(firebaseConfig); db = firebase.database();
  const today = new Date().toISOString().slice(0, 10);
  logsRef = db.ref('days/' + today + '/logs'); tripsRef = db.ref('turer/' + today);

  db.ref('.info/connected').on('value', s => {
      const dot = document.getElementById('syncDot');
      if (dot) dot.style.background = s.val() === true ? 'var(--safe)' : 'grey';
  });

  logsRef.on('value', snap => {
    currentLogs = snap.val() || {};
    const ids = ['personbil', 'paketbil', 'lastbil', 'traktor', 'cykel', 'mc', 'fotgangare', 'moped', 'fyrhjuling'];
    ids.forEach(id => {
        let count = 0; Object.values(currentLogs).forEach(l => { if(l.type === id) count += (l.delta || 1); });
        const el = document.getElementById('b_' + id);
        if (el) el.textContent = Math.max(0, count);
    });
    calculateStats();
  });
  tripsRef.on('value', snap => {
    currentTrips = snap.val() || {};
    const sorted = Object.values(currentTrips).sort((a,b) => b.ts - a.ts).slice(0,4);
    const logDiv = document.getElementById('departureLog');
    if (logDiv) logDiv.innerHTML = sorted.map(t => `<div class="dep-row"><span>${new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'})}</span><span>${t.from || '---'}</span></div>`).join('');
    calculateStats();
  });

  db.ref('config/watlev').on('value', snap => {
    if (snap.val()) {
        const val = snap.val().value;
        const disp = document.getElementById('waterDisplay');
        if (disp) {
            disp.textContent = (val > 0 ? '+' : '') + val + ' CM';
            disp.style.color = (val < -20 || val > 20) ? 'var(--accent)' : 'var(--safe)';
        }
    }
  });

  navigator.geolocation.watchPosition(pos => {
    const kn = pos.coords.speed * 1.94384 || 0;
    document.getElementById('mainSpeedNum').textContent = kn.toFixed(1);
    document.getElementById('speedArc').style.strokeDasharray = `${(Math.min(kn, 10) / 10) * 400} 1000`;
    document.getElementById('miniAcc').textContent = `GPS: ${Math.round(pos.coords.accuracy)}M`;
    if (kn > maxSpeedKn) maxSpeedKn = kn;
    document.getElementById('statMaxSpeed').textContent = maxSpeedKn.toFixed(1) + " kn";
    document.getElementById('statPos').textContent = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
  }, null, { enableHighAccuracy: true });

  fetchWeather(); updateWaterLevel();
  setInterval(fetchWeather, 1800000); setInterval(updateWaterLevel, 900000);
});

async function fetchWeather() {
    try {
        const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=60.03&longitude=22.92&hourly=windspeed_10m,winddirection_10m,weathercode,temperature_2m&wind_speed_unit=ms&timezone=Europe%2FHelsinki`);
        fullWeatherData = await resp.json();
        const hr = new Date().getHours();
        document.getElementById('windMain').textContent = fullWeatherData.hourly.windspeed_10m[hr].toFixed(1) + ' M/S';
        document.getElementById('windDir').style.transform = `rotate(${(fullWeatherData.hourly.winddirection_10m[hr] + 180) % 360}deg)`;
        document.getElementById('mainWeatherIcon').textContent = getWeatherIcon(fullWeatherData.hourly.weathercode[hr], hr);
    } catch (e) {}
}
</script>
</body>
</html>
