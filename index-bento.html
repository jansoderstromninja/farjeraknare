<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknare BENTO v1.2</title>
<style>
/* ── GRUNDSTIL & HÖGKONTRAST ── */
:root {
  --bg: #05080f;
  --surface: #121a2b;
  --glass: rgba(24, 33, 53, 0.9);
  --glass-border: rgba(255, 255, 255, 0.3);
  --text: #ffffff;
  --accent: #3B82F6;
  --signal-yellow: #FACC15; 
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── BENTO DASHBOARD LAYOUT ── */
.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 15px;
  padding: 15px;
  flex: 1;
}

.tile {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.tile-title {
  font-size: 13px;
  font-weight: 900;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 15px;
}

.tile-main-controls {
  grid-column: 1 / 3;
  grid-row: 1 / 4;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 12px;
}

.tile-speed {
  grid-column: 3 / 5;
  grid-row: 1 / 3;
  justify-content: center;
  align-items: center;
}

.tile-water { grid-column: 3 / 4; grid-row: 3 / 4; }
.tile-log { grid-column: 4 / 5; grid-row: 3 / 4; }

/* ── OPERATIONAL BUTTONS (Högkontrast) ── */
.v-btn {
  position: relative;
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s;
  box-shadow: 0 6px 0px rgba(0,0,0,0.4);
}

.v-btn:active { 
  transform: translateY(3px); 
  filter: brightness(1.3);
  border-color: #fff;
}

.v-btn-emoji { 
  font-size: 44px; 
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

.v-btn-label { 
  font-size: 16px; 
  font-weight: 900; 
  margin-top: 6px; 
  color: #fff;
  text-transform: uppercase;
  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

/* ── SIGNAL-GULA BADGES (Fixen för mörk text) ── */
.v-btn-badge {
  position: absolute;
  top: -10px;
  right: -10px;
  background: var(--signal-yellow);
  color: #000; /* Svart text på gult syns bäst */
  padding: 6px 12px;
  border-radius: 14px;
  font-size: 22px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  box-shadow: 0 4px 10px rgba(0,0,0,0.6);
  border: 2px solid #000;
  z-index: 10;
}

.dep-row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--glass-border);
  font-weight: 600;
}
.dep-time { color: var(--muted); }

#speedVal { font-size: 22px; font-weight: 900; fill: #fff; }
</style>
</head>
<body>

<div class="dashboard">
  <div class="tile tile-main-controls" id="btnGrid"></div>

  <div class="tile tile-speed">
    <div class="tile-title">Fart (Knop)</div>
    <svg viewBox="0 0 72 44" width="100%" height="100%" style="max-height: 260px;">
        <path d="M 8 32 A 28 28 0 0 1 64 32" fill="none" stroke="#1e2d47" stroke-width="5" stroke-linecap="round"/>
        <line id="speedNeedle" x1="36" y1="32" x2="12" y2="32" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
        <circle cx="36" cy="32" r="4" fill="#3B82F6"/>
        <text id="speedVal" x="36" y="43" text-anchor="middle" fill="white">0.0 kn</text>
    </svg>
  </div>

  <div class="tile tile-water">
    <div class="tile-title">Vattenstånd</div>
    <div id="waterDisplay" style="font-size: 36px; font-weight: 900; color: #10B981;">-- cm</div>
    <div id="waterTrend" style="font-size: 14px; color: var(--muted); margin-top: 5px;">Hämtar...</div>
  </div>

  <div class="tile tile-log">
    <div class="tile-title">Senaste turer</div>
    <div id="departureLog" style="overflow-y: auto;"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
// ── FIREBASE CONFIG (Kopierad från v7.7) ──
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
  authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare",
  databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

const CATS = [
  { id: 'personbil',  label: 'Bil', emoji: '🚗', color: '#1D4ED8' },
  { id: 'paketbil',   label: 'Paket', emoji: '🚐', color: '#6D28D9' },
  { id: 'lastbil',    label: 'Lastbil', emoji: '🚛', color: '#B91C1C' },
  { id: 'traktor',    label: 'Traktor', emoji: '🚜', color: '#92400E' },
  { id: 'cykel',      label: 'Cykel', emoji: '🚲', color: '#065F46' },
  { id: 'mc',         label: 'MC', emoji: '🏍️', color: '#C2410C' },
  { id: 'fotgangare', label: 'Gående', emoji: '🚶', color: '#0E7490' },
  { id: 'moped',      label: 'Moped', emoji: '🛵', color: '#9D174D' },
  { id: 'fyrhjuling', label: 'ATV', emoji: '🏎️', color: '#3730A3' },
];

// ── INIT MOTOR ──
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const today = new Date().toISOString().slice(0, 10);
const logsRef = db.ref('days/' + today + '/logs');
const tripsRef = db.ref('turer/' + today);

// Firebase Lyssnare
logsRef.on('value', snap => {
    const logs = snap.val() || {};
    const c = {};
    Object.values(logs).forEach(l => {
        c[l.type] = (c[l.type] || 0) + (l.delta || 1);
    });
    CATS.forEach(cat => {
        const badge = document.getElementById('b_' + cat.id);
        if (badge) badge.textContent = Math.max(0, c[cat.id] || 0);
    });
});

tripsRef.on('value', snap => {
    const trips = snap.val() || {};
    const log = document.getElementById('departureLog');
    const sorted = Object.values(trips).sort((a,b) => b.ts - a.ts).slice(0,5);
    log.innerHTML = sorted.map(t => {
        const time = new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        return `<div class="dep-row"><span class="dep-time">${time}</span><span>${t.from || 'Avgång'}</span></div>`;
    }).join('');
});

db.ref('config/watlev').on('value', snap => {
    const data = snap.val();
    if (data) {
        document.getElementById('waterDisplay').textContent = (data.value > 0 ? '+' : '') + data.value + ' cm';
    }
});

// ── BYGG KNAPPAR ──
const grid = document.getElementById('btnGrid');
CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'v-btn';
    btn.style.backgroundColor = cat.color;
    btn.innerHTML = `
        <span class="v-btn-badge" id="b_${cat.id}">0</span>
        <span class="v-btn-emoji">${cat.emoji}</span>
        <span class="v-btn-label">${cat.label}</span>
    `;
    btn.onclick = () => {
        if (navigator.vibrate) navigator.vibrate(25);
        logsRef.push({ type: cat.id, ts: Date.now(), delta: 1 });
    };
    grid.appendChild(btn);
});

// ── GPS SPEEDO ──
navigator.geolocation.watchPosition(pos => {
    const kn = (pos.coords.speed || 0) * 1.94384;
    const angle = (Math.min(kn, 6) / 6 * 180).toFixed(1);
    document.getElementById('speedNeedle').setAttribute('transform', `rotate(${angle},36,32)`);
    document.getElementById('speedVal').textContent = kn.toFixed(1) + ' kn';
}, null, { enableHighAccuracy: true });

</script>
</body>
</html>
