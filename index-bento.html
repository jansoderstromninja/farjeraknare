<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknare BENTO v1.4.5</title>
<style>
:root {
  --bg: #05080f;
  --surface: #121a2b;
  --glass: rgba(24, 33, 53, 0.95);
  --glass-border: rgba(255, 255, 255, 0.3);
  --text: #ffffff;
  --accent: #3B82F6;
  --signal-yellow: #FACC15; 
  --green: #10B981;
  --red: #EF4444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.dashboard {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr; 
  grid-template-rows: 1fr 1fr 1fr;
  gap: 12px;
  padding: 12px;
  flex: 1;
}

.tile {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

#btnGrid {
  grid-column: 1 / 3;
  grid-row: 1 / 4;
  display: grid !important;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 10px;
}
.tile-speed { grid-column: 3 / 4; grid-row: 1 / 2; align-items: center; justify-content: space-between; }
.tile-env   { grid-column: 3 / 4; grid-row: 2 / 3; justify-content: space-between; cursor: pointer; }
.tile-log   { grid-column: 3 / 4; grid-row: 3 / 4; }

.v-btn {
  position: relative;
  width: 100%; height: 100%;
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.v-btn:active { transform: translateY(2px); filter: brightness(1.2); }
.v-btn-emoji { font-size: clamp(24px, 5vh, 44px); }
.v-btn-label { font-size: clamp(10px, 1.5vh, 13px); font-weight: 900; margin-top: 4px; text-transform: uppercase; }

.v-btn-badge {
  position: absolute;
  top: -5px; right: -5px;
  background: var(--signal-yellow);
  color: #000;
  padding: 4px 8px;
  border-radius: 10px;
  font-size: 18px;
  font-weight: 900;
  border: 2px solid #000;
  z-index: 10;
}

.tile-title { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
.water-val { font-size: 34px; font-weight: 900; color: var(--green); }
.wind-box { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 15px; border: 1px solid var(--glass-border); width: 100%; }

#speedValDisplay { font-size: 28px; font-weight: 900; }
.speedo-svg { width: 100%; height: auto; max-height: 90px; }

.sys-status {
  height: 25px; padding: 0 15px; font-size: 10px; font-weight: 800; color: #4a5568; display: flex; justify-content: space-between; align-items: center; background: #000;
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2d3748; margin-right: 5px; }
.dot-online { background: var(--green); box-shadow: 0 0 5px var(--green); }

#weatherOverlay {
  position: fixed; inset: 0; background: rgba(5, 8, 15, 0.98); z-index: 1000; display: none; flex-direction: column; padding: 20px;
}
#weatherOverlay.show { display: flex; }
.prognos-scroll { flex: 1; overflow-y: auto; }
.prognos-row { 
  display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); margin-bottom: 6px; padding: 12px; border-radius: 15px; border-left: 5px solid #2d3748; 
}

@media (max-width: 950px) {
  body { overflow-y: auto; }
  .dashboard { display: flex; flex-direction: column; height: auto; }
  #btnGrid { grid-template-columns: repeat(3, 1fr); width: 100%; margin-bottom: 15px; }
  .tile { width: 100%; margin-bottom: 12px; min-height: 180px; }
}
</style>
</head>
<body>

<div class="dashboard">
  <div id="btnGrid"></div>

  <div class="tile tile-speed">
    <div class="tile-title">Fart (Knop)</div>
    <svg class="speedo-svg" viewBox="0 0 72 44" xmlns="http://www.w3.org/2000/svg">
        <path d="M 8 32 A 28 28 0 0 1 64 32" fill="none" stroke="#1e2d47" stroke-width="6" stroke-linecap="round"/>
        <line id="speedNeedle" x1="36" y1="32" x2="12" y2="32" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
        <circle cx="36" cy="32" r="5" fill="#3B82F6"/>
    </svg>
    <div id="speedValDisplay">0.0 kn</div>
  </div>

  <div class="tile tile-env" onclick="toggleWeather(true)">
    <div class="tile-title">Hangö Russarö (48h)</div>
    <div class="water-val" id="waterDisplay">-- cm</div>
    <div class="wind-box">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div id="mainWeatherIcon" style="font-size: 28px;">☀️</div>
            <div style="display: flex; flex-direction: column;">
                <div id="windMain" style="font-size: 18px; font-weight: 900;">-- m/s</div>
                <div id="windGusts" style="font-size: 11px; font-weight: 700; color: #718096;">Byar: --</div>
            </div>
        </div>
        <div id="windDir" style="transition: transform 0.5s;"><svg width="24" height="24" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="#3B82F6"/></svg></div>
    </div>
  </div>

  <div class="tile tile-log">
    <div class="tile-title">Senaste logg</div>
    <div id="departureLog" style="overflow-y: auto; width: 100%; font-size: 11px;"></div>
  </div>
</div>

<div class="sys-status">
    <div style="display: flex; align-items: center;">
        <div id="syncDot" class="status-dot"></div>
        <span id="syncText">V1.4.5-B</span>
    </div>
    <div id="gpsStatus">GPS: SÖKER...</div>
</div>

<div id="weatherOverlay">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center;">
        <h2 style="font-size: 24px;">48h Prognos</h2>
        <button onclick="toggleWeather(false)" style="color:white; background:#1e2d47; border: 1px solid white; padding: 12px 25px; border-radius: 15px; font-weight: 900; cursor: pointer;">STÄNG ✕</button>
    </div>
    <div class="prognos-scroll" id="prognosContent"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q",
  authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare",
  databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

const CATS = [
  { id: 'personbil',  label: 'Bil', emoji: '🚗', color: '#1D4ED8' },
  { id: 'paketbil',   label: 'Paket', emoji: '🚐', color: '#6D28D9' },
  { id: 'lastbil',    label: 'Lastbil', emoji: '🚛', color: '#B91C1C' },
  { id: 'traktor',    label: 'Traktor', emoji: '🚜', color: '#92400E' },
  { id: 'cykel',      label: 'Cykel', emoji: '🚲', color: '#065F46' },
  { id: 'mc',         label: 'MC', emoji: '🏍️', color: '#C2410C' },
  { id: 'fotgangare', label: 'Gående', emoji: '🚶', color: '#0E7490' },
  { id: 'moped',      label: 'Moped', emoji: '🛵', color: '#9D174D' },
  { id: 'fyrhjuling', label: 'ATV', emoji: '🏎️', color: '#3730A3' },
];

var db, logsRef, tripsRef, fullWeatherData;

// ── FMI WATER LEVEL LOGIC (v1.4.5) ──
function buildFmiWaterUrl() {
  const now = new Date();
  const end = now.toISOString().slice(0, 19) + 'Z';
  const start = new Date(now - 2 * 3600 * 1000).toISOString().slice(0, 19) + 'Z';
  return `https://opendata.fmi.fi/wfs?service=WFS&version=2.0.0&request=getFeature&storedquery_id=fmi::observations::mareograph::instant::simple&fmisid=134253&starttime=${start}&endtime=${end}`;
}

function parseFmiWater(xmlText) {
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");
    const elements = xml.getElementsByTagNameNS("*", "BsWfsElement");
    let latestVal = null;
    for (let el of elements) {
        const param = el.getElementsByTagNameNS("*", "ParameterName")[0]?.textContent;
        const val = el.getElementsByTagNameNS("*", "ParameterValue")[0]?.textContent;
        if (param === "WATLEV") latestVal = parseFloat(val);
    }
    return latestVal; // Returneras i mm
}

async function updateWaterLevel() {
    try {
        const resp = await fetch(buildFmiWaterUrl());
        const text = await resp.text();
        const mm = parseFmiWater(text);
        if (mm !== null) {
            const cm = Math.round(mm / 10);
            if (db) db.ref('config/watlev').set({ value: cm, ts: Date.now() });
            const disp = document.getElementById('waterDisplay');
            disp.textContent = (cm > 0 ? '+' : '') + cm + ' cm';
            disp.style.color = (cm < -20 || cm > 20) ? 'var(--red)' : 'var(--green)';
        }
    } catch (e) { console.error("FMI Water Error:", e); }
}

// ── WEATHER HELPERS ──
function getWeatherIcon(code, timeStr, temp) {
    const hour = parseInt(timeStr.slice(0, 2));
    const isNight = hour < 6 || hour > 22;
    if (temp < -15) return "🥶";
    if (code === 0) return isNight ? "🌙" : "☀️";
    if (code <= 3) return isNight ? "☁️" : "🌤️";
    if (code >= 51 && code <= 67) return "🌧️";
    if (code >= 71 && code <= 77) return "❄️";
    if (code >= 95) return "⛈️";
    return "🌤️";
}

document.addEventListener('DOMContentLoaded', function() {
  const grid = document.getElementById('btnGrid');
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'v-btn';
    btn.style.backgroundColor = cat.color;
    btn.innerHTML = `<span class="v-btn-badge" id="b_${cat.id}">0</span><span class="v-btn-emoji">${cat.emoji}</span><span class="v-btn-label">${cat.label}</span>`;
    btn.onclick = () => {
        if (navigator.vibrate) navigator.vibrate(25);
        if (logsRef) logsRef.push({ type: cat.id, ts: Date.now(), delta: 1 });
    };
    grid.appendChild(btn);
  });
  initApp();
  fetchWeather();
  updateWaterLevel();
  setInterval(fetchWeather, 1000 * 60 * 30);
  setInterval(updateWaterLevel, 1000 * 60 * 15); // Kolla vatten var 15:e min
});

function initApp() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    var today = new Date().toISOString().slice(0, 10);
    logsRef = db.ref('days/' + today + '/logs');
    tripsRef = db.ref('turer/' + today);

    db.ref('.info/connected').on('value', snap => {
        const dot = document.getElementById('syncDot');
        if (snap.val() === true) dot.classList.add('dot-online');
        else dot.classList.remove('dot-online');
    });

    logsRef.on('value', snap => {
      const logs = snap.val() || {};
      const c = {};
      Object.values(logs).forEach(l => { c[l.type] = (c[l.type] || 0) + (l.delta || 1); });
      CATS.forEach(cat => {
          const badge = document.getElementById('b_' + cat.id);
          if (badge) badge.textContent = Math.max(0, c[cat.id] || 0);
      });
    });

    tripsRef.on('value', snap => {
      const trips = snap.val() || {};
      const logDiv = document.getElementById('departureLog');
      const sorted = Object.values(trips).sort((a,b) => b.ts - a.ts).slice(0,5);
      if (logDiv) logDiv.innerHTML = sorted.map(t => {
          const time = new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
          return `<div class="dep-row"><span>${time}</span><span>${t.from || 'Avgång'}</span></div>`;
      }).join('');
    });

    // Lyssna på vattenstånd (för att synka mellan enheter)
    db.ref('config/watlev').on('value', snap => {
      const data = snap.val();
      if (data) {
          const disp = document.getElementById('waterDisplay');
          disp.textContent = (data.value > 0 ? '+' : '') + data.value + ' cm';
          disp.style.color = (data.value < -20 || data.value > 20) ? 'var(--red)' : 'var(--green)';
      }
    });

    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(pos => {
        const kn = (pos.coords.speed || 0) * 1.94384;
        const angle = (Math.min(kn, 6) / 6 * 180).toFixed(1);
        document.getElementById('speedNeedle').setAttribute('transform', `rotate(${angle},36,32)`);
        document.getElementById('speedValDisplay').textContent = kn.toFixed(1) + ' kn';
        document.getElementById('gpsStatus').textContent = "GPS: " + Math.round(pos.coords.accuracy) + "m";
      }, null, { enableHighAccuracy: true });
    }
  } catch (e) { console.error(e); }
}

function toggleWeather(show) {
    document.getElementById('weatherOverlay').classList.toggle('show', show);
    if (show) renderFullForecast();
}

async function fetchWeather() {
    try {
        const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=60.03&longitude=22.92&hourly=windspeed_10m,windgusts_10m,winddirection_10m,temperature_2m,weathercode&wind_speed_unit=ms&timezone=Europe%2FHelsinki`);
        fullWeatherData = await resp.json();
        const hour = new Date().getHours();
        const h = fullWeatherData.hourly;
        document.getElementById('windMain').textContent = h.windspeed_10m[hour].toFixed(1) + ' m/s';
        document.getElementById('windGusts').textContent = 'Byar: ' + h.windgusts_10m[hour].toFixed(1);
        document.getElementById('windDir').style.transform = `rotate(${(h.winddirection_10m[hour] + 180) % 360}deg)`;
        document.getElementById('mainWeatherIcon').textContent = getWeatherIcon(h.weathercode[hour], h.time[hour].slice(11, 16), h.temperature_2m[hour]);
    } catch (e) { console.error(e); }
}

function renderFullForecast() {
    const container = document.getElementById('prognosContent');
    if (!fullWeatherData) return;
    let html = "";
    const h = fullWeatherData.hourly;
    const nowIdx = new Date().getHours();
    for (let i = nowIdx; i < h.time.length && i < nowIdx + 48; i++) {
        const time = h.time[i].slice(11, 16);
        const icon = getWeatherIcon(h.weathercode[i], time, h.temperature_2m[i]);
        const rotation = (h.winddirection_10m[i] + 180) % 360;
        html += `
            <div class="prognos-row" style="border-left-color: ${h.windspeed_10m[i] < 12 ? 'var(--accent)' : 'var(--red)'}">
                <div class="p-time">${time}</div>
                <div style="font-size:22px">${icon}</div>
                <div class="p-wind" style="flex:1; margin-left:10px">${h.windspeed_10m[i].toFixed(1)} <small>(${h.windgusts_10m[i].toFixed(1)})</small> m/s</div>
                <div style="font-weight:800">${h.temperature_2m[i].toFixed(1)}°C</div>
                <div style="transform: rotate(${rotation}deg); margin-left:15px"><svg width="20" height="20" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="#718096"/></svg></div>
            </div>
        `;
    }
    container.innerHTML = html;
}
</script>
</body>
</html>
