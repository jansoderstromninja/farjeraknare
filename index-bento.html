<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknare TACTICAL v1.6.7</title>
<style>
:root {
  --bg: #000000;
  --panel: #161b22; 
  --border: #30363d;
  --text: #ffffff;
  --accent: #ff3b30; 
  --safe: #10B981;   
  --dim: #8b949e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* Tactical Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'SF Mono', 'Roboto Mono', monospace;
  min-height: 100dvh; width: 100vw;
  display: flex; flex-direction: column; 
  overflow-y: auto; /* Tillåter skroll på hela dashboarden i Chrome */
}

/* ── DASHBOARD GRID ── */
.dashboard {
  display: grid; 
  grid-template-columns: 1fr 1fr 1.2fr;
  grid-template-rows: 1fr 1fr 1fr;
  gap: 12px; padding: 12px; flex: 1;
  min-height: 700px;
}

.tile {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 15px; display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

.tile-header {
    font-size: 10px; font-weight: 800; color: var(--accent);
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 8px; border-bottom: 1px solid var(--border);
    padding-bottom: 5px; display: flex; justify-content: space-between;
}

/* ── KNAPP-GRID (Hårdkodat) ── */
.btn-grid-area {
  grid-column: 1 / 3; grid-row: 1 / 4;
  display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 10px;
}

.tile-speed { grid-column: 3 / 4; grid-row: 1 / 2; justify-content: center; align-items: center; }
.tile-env   { grid-column: 3 / 4; grid-row: 2 / 3; cursor: pointer; }
.tile-log   { grid-column: 3 / 4; grid-row: 3 / 4; cursor: pointer; }

/* TACTICAL BUTTONS - 65PX IKONER */
.v-btn {
  position: relative; width: 100%; height: 100%; 
  border: 1px solid var(--border); background: #0d1117;
  border-radius: 8px; display: flex; flex-direction: column; 
  align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.1s;
}
.v-btn:active { background: #21262d; transform: scale(0.97); }
.v-btn.removing { background-color: var(--accent) !important; color: #000; }

.v-btn-emoji { font-size: 65px; margin-bottom: 5px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
.v-btn-label { font-size: 13px; font-weight: 800; color: #fff; text-transform: uppercase; }

.v-btn-badge {
  position: absolute; top: 8px; right: 8px; 
  background: var(--bg); color: var(--accent);
  padding: 2px 8px; border: 1px solid var(--accent);
  border-radius: 6px; font-size: 16px; font-weight: 900;
}

/* ── OVERLAYS (THE SCROLL FIX) ── */
.overlay {
  position: fixed; inset: 0; background: #000; z-index: 2000;
  display: none; flex-direction: column;
}
.overlay.show { display: flex; }
.overlay-hdr-fixed {
  flex-shrink: 0; padding: 20px; background: #000;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.overlay-scroll-area {
  flex: 1; overflow-y: auto; padding: 20px;
}

.prognos-row {
  display: flex; align-items: center; gap: 12px; 
  background: var(--panel); margin-bottom: 8px; padding: 15px;
  border: 1px solid var(--border); border-left: 4px solid var(--accent);
}

.sys-bar {
  height: 25px; background: #000; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 15px; font-size: 9px; font-weight: 800; color: var(--dim);
}

@media (max-width: 950px) {
  .dashboard { display: flex; flex-direction: column; height: auto; }
  .btn-grid-area { grid-template-columns: repeat(3, 1fr); min-height: 550px; margin-bottom: 10px; }
  .tile { min-height: 200px; margin-bottom: 10px; }
}
</style>
</head>
<body>

<div class="dashboard">
  <!-- KONTROLLER (Hårdkodade för stabilitet) -->
  <div class="btn-grid-area">
      <button class="v-btn" onpointerdown="startUndo('personbil', this)" onpointerup="stopUndo()" onclick="tap('personbil')">
          <span class="v-btn-badge" id="b_personbil">0</span><span class="v-btn-emoji">🚗</span><span class="v-btn-label">Bil</span>
      </button>
      <button class="v-btn" onpointerdown="startUndo('paketbil', this)" onpointerup="stopUndo()" onclick="tap('paketbil')">
          <span class="v-btn-badge" id="b_paketbil">0</span><span class="v-btn-emoji">🚐</span><span class="v-btn-label">Paket</span>
      </button>
      <button class="v-btn" onpointerdown="startUndo('lastbil', this)" onpointerup="stopUndo()" onclick="tap('lastbil')">
          <span class="v-btn-badge" id="b_lastbil">0</span><span class="v-btn-emoji">🚛</span><span class="v-btn-label">Lastbil</span>
      </button>
      <button class="v-btn" onpointerdown="startUndo('traktor', this)" onpointerup="stopUndo()" onclick="tap('traktor')">
          <span class="v-btn-badge" id="b_traktor">0</span><span class="v-btn-emoji">🚜</span><span class="v-btn-label">Traktor</span>
      </button>
      <button class="v-btn" onpointerdown="startUndo('cykel', this)" onpointerup="stopUndo()" onclick="tap('cykel')">
          <span class="v-btn-badge" id="b_cykel">0</span><span class="v-btn-emoji">🚲</span><span class="v-btn-label">Cykel</span>
      </button>
      <button class="v-btn" onpointerdown="startUndo('mc', this)" onpointerup="stopUndo()" onclick="tap('mc')">
          <span class="v-btn-badge" id="b_mc">0</span><span class="v-btn-emoji">🏍️</span><span class="v-btn-label">MC</span>
      </button>
      <button class="v-btn" onpointerdown="startUndo('fotgangare', this)" onpointerup="stopUndo()" onclick="tap('fotgangare')">
          <span class="v-btn-badge" id="b_fotgangare">0</span><span class="v-btn-emoji">🚶</span><span class="v-btn-label">Gående</span>
      </button>
      <button class="v-btn" onpointerdown="startUndo('moped', this)" onpointerup="stopUndo()" onclick="tap('moped')">
          <span class="v-btn-badge" id="b_moped">0</span><span class="v-btn-emoji">🛵</span><span class="v-btn-label">Moped</span>
      </button>
      <button class="v-btn" onpointerdown="startUndo('fyrhjuling', this)" onpointerup="stopUndo()" onclick="tap('fyrhjuling')">
          <span class="v-btn-badge" id="b_fyrhjuling">0</span><span class="v-btn-emoji">🏎️</span><span class="v-btn-label">ATV</span>
      </button>
  </div>

  <!-- SPEEDO -->
  <div class="tile tile-speed" onclick="toggleOverlay('navOverlay', true)">
    <div class="tile-header"><span>VELOCITY / TACTICAL</span><span id="miniAcc">--</span></div>
    <div style="width:100%; position:relative; display:flex; justify-content:center;">
        <svg viewBox="0 0 200 120" width="100%">
            <path d="M 40 100 A 70 70 0 1 1 160 100" fill="none" stroke="#222" stroke-width="12" stroke-dasharray="8 2"/>
            <path id="speedArc" d="M 40 100 A 70 70 0 1 1 160 100" fill="none" stroke="var(--accent)" stroke-width="12" stroke-dasharray="0 1000" />
        </svg>
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -40%); text-align:center;">
            <span style="font-size:64px; font-weight:300;" id="mainSpeedNum">0.0</span>
            <span style="font-size:12px; font-weight:900; color:var(--accent); display:block;">KNOTS</span>
        </div>
    </div>
  </div>

  <!-- ENV -->
  <div class="tile tile-env" onclick="toggleOverlay('weatherOverlay', true)">
    <div class="tile-header">ENVIRONMENT / RUSSARÖ</div>
    <div style="font-size:38px; font-weight:300; color:var(--safe);" id="waterDisplay">-- CM</div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
        <div style="display:flex; align-items:center; gap:8px;">
            <span id="mainWeatherIcon" style="font-size:28px;">☀️</span>
            <span id="windMain" style="font-weight:800; font-size:20px;">-- M/S</span>
        </div>
        <div id="windDir"><svg width="24" height="24" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="var(--accent)"/></svg></div>
    </div>
  </div>

  <!-- LOG -->
  <div class="tile tile-log" onclick="toggleOverlay('statsOverlay', true)">
    <div class="tile-header">MISSION LOG / STATS</div>
    <div id="departureLog" style="flex:1; font-size:11px;"></div>
  </div>
</div>

<div class="sys-bar">
    <div style="display:flex; align-items:center;"><div style="width:6px; height:6px; background:var(--safe); border-radius:1px; margin-right:5px;"></div><span>v1.6.7-B / HARDCODED_STABILITY</span></div>
    <div id="gpsStatusText">GPS_READY</div>
</div>

<!-- OVERLAYS -->
<div id="navOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span>NAVIGATION_DEEP_DATA</span><button onclick="toggleOverlay('navOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800; cursor:pointer;">CLOSE</button></div>
    <div class="overlay-scroll-area">
        <div class="tile" style="margin-bottom:15px;"><span class="tile-header">MAX_VELOCITY</span><span id="statMaxSpeed" style="font-size:54px;">0.0 kn</span></div>
        <div class="tile" style="margin-bottom:15px;"><span class="tile-header">TOTAL_DISTANCE</span><span id="statDistance" style="font-size:54px;">0.00 NM</span></div>
    </div>
</div>

<div id="weatherOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span>METEOROLOGICAL_REPORT_48H</span><button onclick="toggleOverlay('weatherOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800; cursor:pointer;">CLOSE</button></div>
    <div id="prognosContent" class="overlay-scroll-area"></div>
</div>

<div id="statsOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span>TRAFFIC_ANALYSIS</span><button onclick="toggleOverlay('statsOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800; cursor:pointer;">CLOSE</button></div>
    <div id="statsContent" class="overlay-scroll-area">
        <div class="tile" style="margin-bottom:15px;"><span class="tile-header">TOTAL_VEHICLES</span><div id="statTotal" style="font-size:72px; color:var(--safe);">0</div></div>
        <div class="tile"><span class="tile-header">TOTAL_DEPARTURES</span><div id="statTrips" style="font-size:72px;">0</div></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q", authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare", databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

var db, logsRef, tripsRef, fullWeatherData, currentLogs = {}, currentTrips = {};
var maxSpeedKn = 0, totalDistanceNM = 0, lastLat = null, lastLon = null;
var undoTimer;

function tap(id) {
    if (navigator.vibrate) navigator.vibrate(20);
    if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: 1 });
}

function startUndo(id, btn) {
    undoTimer = setTimeout(() => {
        btn.classList.add('removing');
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
        if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: -1 });
        setTimeout(() => btn.classList.remove('removing'), 1000);
    }, 800);
}
function stopUndo() { clearTimeout(undoTimer); }

function toggleOverlay(id, show) {
    document.getElementById(id).style.display = show ? 'flex' : 'none';
    if (show && id === 'statsOverlay') calculateStats();
    if (show && id === 'weatherOverlay') renderFullForecast();
}

function calculateStats() {
    const logs = Object.values(currentLogs);
    document.getElementById('statTotal').textContent = logs.reduce((sum, l) => sum + (l.delta || 1), 0);
    document.getElementById('statTrips').textContent = Object.values(currentTrips).length;
}

function getCompass(deg) { return ["N", "NO", "O", "SO", "S", "SV", "V", "NV"][Math.round(deg / 45) % 8]; }

function renderFullForecast() {
    const container = document.getElementById('prognosContent');
    if (!fullWeatherData) return;
    let html = ""; const h = fullWeatherData.hourly; const nowIdx = new Date().getHours();
    for (let i = nowIdx; i < h.time.length && i < nowIdx + 48; i++) {
        const speed = h.windspeed_10m[i];
        const color = speed < 6 ? "#10B981" : speed < 12 ? "#F59E0B" : "#ff3b30";
        html += `<div class="prognos-row" style="border-left-color: ${color}">
            <div style="font-weight:900; min-width:55px; font-size:14px;">${h.time[i].slice(11, 16)}</div>
            <div style="flex:1; color:${color}; font-weight:800;">${speed.toFixed(1)} m/s</div>
            <div style="transform: rotate(${(h.winddirection_10m[i] + 180) % 360}deg); margin-left:15px; display:flex; flex-direction:column; align-items:center;">
                <svg width="18" height="18" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="${color}"/></svg>
                <span style="font-size:8px; font-weight:800; color:var(--dim)">${getCompass(h.winddirection_10m[i])}</span>
            </div>
        </div>`;
    }
    container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  try {
    firebase.initializeApp(firebaseConfig); db = firebase.database();
    const today = new Date().toISOString().slice(0, 10);
    logsRef = db.ref('days/' + today + '/logs'); tripsRef = db.ref('turer/' + today);

    logsRef.on('value', snap => {
      currentLogs = snap.val() || {};
      const ids = ['personbil', 'paketbil', 'lastbil', 'traktor', 'cykel', 'mc', 'fotgangare', 'moped', 'fyrhjuling'];
      ids.forEach(id => {
          let count = 0; Object.values(currentLogs).forEach(l => { if(l.type === id) count += (l.delta || 1); });
          const el = document.getElementById('b_' + id);
          if (el) el.textContent = Math.max(0, count);
      });
    });
    
    tripsRef.on('value', snap => {
      currentTrips = snap.val() || {};
      const sorted = Object.values(currentTrips).sort((a,b) => b.ts - a.ts).slice(0,4);
      const logDiv = document.getElementById('departureLog');
      if (logDiv) logDiv.innerHTML = sorted.map(t => `<div class="dep-row"><span>${new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'})}</span><span>${t.from || '---'}</span></div>`).join('');
    });

    db.ref('config/watlev').on('value', snap => {
      if (snap.val()) document.getElementById('waterDisplay').textContent = (snap.val().value > 0 ? '+' : '') + snap.val().value + ' CM';
    });

    navigator.geolocation.watchPosition(pos => {
      const kn = pos.coords.speed * 1.94384 || 0;
      document.getElementById('mainSpeedNum').textContent = kn.toFixed(1);
      document.getElementById('speedArc').style.strokeDasharray = `${(Math.min(kn, 10) / 10) * 400} 1000`;
      document.getElementById('miniAcc').textContent = `${Math.round(pos.coords.accuracy)}M`;
      if (kn > maxSpeedKn) maxSpeedKn = kn;
      document.getElementById('statMaxSpeed').textContent = maxSpeedKn.toFixed(1) + " kn";
    }, null, { enableHighAccuracy: true });

    fetchWeather();
  } catch (e) { console.error(e); }
});

async function fetchWeather() {
    try {
        const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=60.03&longitude=22.92&hourly=windspeed_10m,winddirection_10m,temperature_2m&wind_speed_unit=ms&timezone=Europe%2FHelsinki`);
        fullWeatherData = await resp.json();
        const hr = new Date().getHours();
        document.getElementById('windMain').textContent = fullWeatherData.hourly.windspeed_10m[hr].toFixed(1) + ' M/S';
        document.getElementById('windDir').style.transform = `rotate(${(fullWeatherData.hourly.winddirection_10m[hr] + 180) % 360}deg)`;
    } catch (e) {}
}
</script>
</body>
</html>
