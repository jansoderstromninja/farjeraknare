<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Färjeräknare TACTICAL v1.9.1</title>
<link rel="stylesheet" href="tactical.css">
</head>
<body>

<div class="dashboard">
  <div class="btn-grid-area">
      <button class="v-btn" onpointerdown="btnDown('personbil', this)" onpointerup="btnUp('personbil', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_personbil">0</span><span class="v-btn-emoji">🚗</span><span class="v-btn-label">Bil</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('paketbil', this)" onpointerup="btnUp('paketbil', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_paketbil">0</span><span class="v-btn-emoji">🚐</span><span class="v-btn-label">Paket</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('lastbil', this)" onpointerup="btnUp('lastbil', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_lastbil">0</span><span class="v-btn-emoji">🚛</span><span class="v-btn-label">Lastbil</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('traktor', this)" onpointerup="btnUp('traktor', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_traktor">0</span><span class="v-btn-emoji">🚜</span><span class="v-btn-label">Traktor</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('cykel', this)" onpointerup="btnUp('cykel', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_cykel">0</span><span class="v-btn-emoji">🚲</span><span class="v-btn-label">Cykel</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('mc', this)" onpointerup="btnUp('mc', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_mc">0</span><span class="v-btn-emoji">🏍️</span><span class="v-btn-label">MC</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('fotgangare', this)" onpointerup="btnUp('fotgangare', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_fotgangare">0</span><span class="v-btn-emoji">🚶</span><span class="v-btn-label">Gående</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('moped', this)" onpointerup="btnUp('moped', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_moped">0</span><span class="v-btn-emoji">🛵</span><span class="v-btn-label">Moped</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('fyrhjuling', this)" onpointerup="btnUp('fyrhjuling', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_fyrhjuling">0</span><span class="v-btn-emoji">🏎️</span><span class="v-btn-label">ATV</span>
      </button>
  </div>

  <div class="tile tile-speed" onclick="toggleOverlay('navOverlay', true)">
    <div class="tile-header">VELOCITY / TACTICAL</div>
    <div style="width:100%; position:relative; display:flex; justify-content:center; flex:1; min-height:0;">
        <svg viewBox="0 0 200 130" style="height: 100%; width: 100%;">
            <path d="M 40 110 A 70 70 0 1 1 160 110" fill="none" stroke="#111" stroke-width="12" stroke-dasharray="8 2"/>
            <path id="speedArc" d="M 40 110 A 70 70 0 1 1 160 110" fill="none" stroke="var(--accent)" stroke-width="12" stroke-dasharray="0 1000" />
            <text id="mainSpeedNum" x="100" y="100" text-anchor="middle" fill="#fff" style="font-size: 58px; font-weight: 300;">0.0</text>
            <text x="100" y="115" text-anchor="middle" fill="var(--accent)" style="font-size: 10px; font-weight: 900; letter-spacing: 2px;">KNOTS</text>
        </svg>
    </div>
  </div>

  <div class="tile tile-env" onclick="toggleOverlay('weatherOverlay', true)">
    <div class="tile-header">ENVIRONMENT / HANGÖ</div>
    <div class="water-display" id="waterDisplay">-- CM</div>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="display:flex; align-items:center; gap:8px;">
            <span id="mainWeatherIcon" style="font-size:24px;">☀️</span>
            <span id="windMain" style="font-weight:800; font-size:18px;">-- M/S</span>
        </div>
        <div id="windDir"><svg width="24" height="24" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="var(--accent)"/></svg></div>
    </div>
  </div>

  <!-- MISSION CONTROL: NU HELA RUTAN KLICKBAR -->
  <div class="tile tile-log" id="logTile" onclick="toggleOverlay('statsOverlay', true)">
    <div class="tile-header">
        <span id="missionHeader">MISSION CONTROL</span>
        <span class="alert-text">CHECK_PIER!</span>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
        <div style="background:rgba(0,0,0,0.3); padding:4px; text-align:center; border-radius:4px;"><span style="font-size:7px; color:var(--dim); display:block;">VEH</span><span id="miniStatTotal" style="font-size:16px; font-weight:800; color:#fff;">0</span></div>
        <div style="background:rgba(0,0,0,0.3); padding:4px; text-align:center; border-radius:4px;"><span style="font-size:7px; color:var(--dim); display:block;">DEP</span><span id="miniStatTrips" style="font-size:16px; font-weight:800; color:#fff;">0</span></div>
    </div>
    <div class="dep-list" id="departureLog"></div>
    <div class="sys-bar-internal">
        <div style="display:flex; align-items:center;"><div id="syncDot" style="width:5px; height:5px; background:grey; border-radius:1px; margin-right:4px;"></div>SYNC</div>
        <div style="text-align:right;">v1.9.1-B</div>
        <div>GPS_ACC: <span id="gpsAccTel">--</span></div>
        <div id="gpsStatusTel" style="text-align:right;">SCAN</div>
    </div>
  </div>
</div>

<!-- OVERLAYS -->
<div id="navOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span style="color:#fff; font-weight:900;">NAVIGATION_DEEP_DATA</span><button onclick="toggleOverlay('navOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800; cursor:pointer;">CLOSE</button></div>
    <div class="overlay-scroll">
        <div class="tile" style="margin-bottom:10px; align-items:center;">
            <svg viewBox="0 0 200 160" width="100%" style="max-width:300px;">
                <defs><linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#10B981" /><stop offset="50%" stop-color="#F59E0B" /><stop offset="100%" stop-color="#EF4444" /></linearGradient></defs>
                <path d="M 35 147 A 75 75 0 1 1 165 147" fill="none" stroke="url(#gaugeGradient)" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
                <g style="font-size:12px; font-weight:900; fill:#718096" text-anchor="middle">
                    <text x="20" y="155">0</text><text x="12" y="100">1</text><text x="45" y="45">2</text><text x="100" y="25">3</text><text x="155" y="45">4</text><text x="188" y="100">5</text><text x="180" y="155">6</text>
                </g>
                <g id="megaNeedleGroup" transform="rotate(-120 100 110)" style="transition: transform 0.3s ease-out;">
                    <line x1="100" y1="110" x2="100" y2="35" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
                    <line x1="100" y1="45" x2="100" y2="35" stroke="#EF4444" stroke-width="5" stroke-linecap="round"/>
                </g>
                <circle cx="100" cy="110" r="10" fill="#fff" stroke="#121a2b" stroke-width="2"/>
            </svg>
        </div>
        <div class="tile" style="margin-bottom:10px;"><span class="tile-header">MAX_VELOCITY</span><span id="statMaxSpeed" style="font-size:48px; font-weight:300;">0.0 kn</span></div>
        <div class="tile" style="margin-bottom:10px;"><span class="tile-header">TOTAL_DISTANCE</span><span id="statDistance" style="font-size:48px; font-weight:300;">0.00 NM</span></div>
    </div>
</div>

<div id="weatherOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span style="color:#fff; font-weight:900;">METEOROLOGICAL_REPORT_48H</span><button onclick="toggleOverlay('weatherOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800; cursor:pointer;">CLOSE</button></div>
    <div id="prognosContent" class="overlay-scroll"></div>
</div>

<div id="statsOverlay" class="overlay">
    <div class="overlay-hdr-fixed"><span style="color:#fff; font-weight:900;">MISSION_SORTIE_LOG</span><button onclick="toggleOverlay('statsOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800; cursor:pointer;">CLOSE</button></div>
    <div id="statsContent" class="overlay-scroll"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q", authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare", databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

var db, logsRef, tripsRef, fullWeatherData, currentLogs = {}, currentTrips = {};
var maxSpeedKn = 0, totalDistanceNM = 0, lastLat = null, lastLon = null;
var lastDepartureTs = Date.now();
var undoTimer = null, didUndo = false;

// ── CORE LOGIC ──
function btnDown(id, btn) {
    didUndo = false;
    undoTimer = setTimeout(() => {
        didUndo = true;
        btn.classList.add('removing');
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
        if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: -1 });
        setTimeout(() => btn.classList.remove('removing'), 1000);
    }, 700);
}
function btnUp(id, btn) {
    clearTimeout(undoTimer);
    if (!didUndo) {
        if (navigator.vibrate) navigator.vibrate(20);
        if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: 1 });
    }
}
function btnCancel() { clearTimeout(undoTimer); }

function toggleOverlay(id, show) {
    document.getElementById(id).style.display = show ? 'flex' : 'none';
    if (show && id === 'statsOverlay') renderLogs();
    if (show && id === 'weatherOverlay') renderFullForecast();
}

function calculateStats() {
    const logs = Object.values(currentLogs);
    const total = logs.reduce((sum, l) => sum + (l.delta || 1), 0);
    const tripCount = Object.values(currentTrips).length;
    document.getElementById('miniStatTotal').textContent = total;
    document.getElementById('miniStatTrips').textContent = tripCount;
    if (tripCount > 0) lastDepartureTs = Math.max(...Object.values(currentTrips).map(t => t.ts));
    renderLogs();
}

function renderLogs() {
    const logDiv = document.getElementById('departureLog');
    const statsContainer = document.getElementById('statsContent');
    if (!logDiv) return;

    const sortedTrips = Object.values(currentTrips).sort((a,b) => b.ts - a.ts);
    const logs = Object.values(currentLogs);

    const buildRow = (t) => {
        const time = new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
        const vehCount = logs.filter(l => Math.abs(l.ts - t.ts) <= 180000)
                             .reduce((sum, l) => sum + (l.delta || 1), 0);
        return `<div class="dep-row"><span class="time">${time}</span><span class="pier">${t.from || '---'}</span><span class="count">${vehCount}</span></div>`;
    };

    logDiv.innerHTML = sortedTrips.slice(0, 3).map(buildRow).join('');

    if (statsContainer) {
        statsContainer.innerHTML = `
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                <div class="tile"><span class="tile-header">TOTAL_VEH</span><div style="font-size:32px;">${document.getElementById('miniStatTotal').textContent}</div></div>
                <div class="tile"><span class="tile-header">TOTAL_DEP</span><div style="font-size:32px;">${document.getElementById('miniStatTrips').textContent}</div></div>
            </div>
            <div class="tile-header">RECENT_SORTIE_LOG</div>
            ${sortedTrips.slice(0, 20).map(buildRow).join('')}
        `;
    }
}

function checkReminder() {
    const header = document.getElementById('missionHeader');
    if (!header) return;
    const elapsed = Date.now() - lastDepartureTs;
    if (elapsed > 22 * 60 * 1000) header.parentElement.classList.add('alert-active');
    else header.parentElement.classList.remove('alert-active');
}

// ── EXTERNAL DATA ──
async function updateWaterLevel() {
  const start = new Date(Date.now() - 3 * 3600 * 1000).toISOString().slice(0, 19) + 'Z';
  try {
    const resp = await fetch(`https://opendata.fmi.fi/wfs?service=WFS&version=2.0.0&request=getFeature&storedquery_id=fmi::observations::mareograph::instant::simple&fmisid=134253&starttime=${start}`);
    const doc = new DOMParser().parseFromString(await resp.text(), 'application/xml');
    const els = doc.getElementsByTagNameNS('*', 'BsWfsElement');
    for (let el of els) {
      if (el.getElementsByTagNameNS('*', 'ParameterName')[0]?.textContent === 'WATLEV') {
        const cm = Math.round(parseFloat(el.getElementsByTagNameNS('*', 'ParameterValue')[0]?.textContent) / 10);
        if (db) db.ref('config/watlev').set({ value: cm, ts: Date.now() });
      }
    }
  } catch (e) {}
}

function getWeatherIcon(code, hour) {
    const isNight = hour < 6 || hour > 22;
    if (code === 0) return isNight ? "🌙" : "☀️";
    if (code <= 3) return isNight ? "☁️" : "🌤️";
    if (code >= 51 && code <= 67) return "🌧️";
    return "🌤️";
}

function renderFullForecast() {
    const container = document.getElementById('prognosContent');
    if (!fullWeatherData) return;
    let html = ""; const h = fullWeatherData.hourly; const nowIdx = new Date().getHours();
    for (let i = nowIdx; i < h.time.length && i < nowIdx + 48; i++) {
        const speed = h.windspeed_10m[i];
        const color = speed < 6 ? "#30d158" : speed < 12 ? "#ffd60a" : "#ff453a";
        const rotation = (h.winddirection_10m[i] + 180) % 360;
        
        html += `<div class="prognos-row" style="border-left-color: ${color}">
            <div style="font-weight:900; font-size:14px;">${h.time[i].slice(11, 16)}</div>
            <div style="font-size:22px; text-align:center;">${getWeatherIcon(h.weathercode[i], parseInt(h.time[i].slice(11,13)))}</div>
            <div class="p-wind" style="color:${color}">${speed.toFixed(1)} m/s</div>
            <div style="transform: rotate(${rotation}deg); display:flex; justify-content:center;"><svg width="18" height="18" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="${color}"/></svg></div>
            <div style="font-weight:800; text-align:right; color:#fff">${h.temperature_2m[i].toFixed(1)}°C</div>
        </div>`;
    }
    container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  firebase.initializeApp(firebaseConfig); db = firebase.database();
  const today = new Date().toISOString().slice(0, 10);
  logsRef = db.ref('days/' + today + '/logs'); tripsRef = db.ref('turer/' + today);

  db.ref('.info/connected').on('value', s => {
      const dot = document.getElementById('syncDot');
      if (dot) dot.style.background = s.val() === true ? 'var(--safe)' : 'grey';
  });

  logsRef.on('value', snap => {
    currentLogs = snap.val() || {};
    ['personbil', 'paketbil', 'lastbil', 'traktor', 'cykel', 'mc', 'fotgangare', 'moped', 'fyrhjuling'].forEach(id => {
        let count = 0; Object.values(currentLogs).forEach(l => { if(l.type === id) count += (l.delta || 1); });
        const el = document.getElementById('b_' + id); if (el) el.textContent = Math.max(0, count);
    });
    calculateStats();
  });

  tripsRef.on('value', snap => {
    currentTrips = snap.val() || {};
    calculateStats();
  });

  db.ref('config/watlev').on('value', snap => {
    if (snap.val()) {
        const val = snap.val().value;
        const disp = document.getElementById('waterDisplay');
        if (disp) {
            disp.textContent = (val > 0 ? '+' : '') + val + ' CM';
            disp.style.color = (val < -20 || val > 20) ? 'var(--accent)' : 'var(--safe)';
        }
    }
  });

  navigator.geolocation.watchPosition(pos => {
    const kn = pos.coords.speed * 1.94384 || 0;
    const acc = Math.round(pos.coords.accuracy);
    document.getElementById('mainSpeedNum').textContent = kn.toFixed(1);
    document.getElementById('speedArc').style.strokeDasharray = `${(Math.min(kn, 10) / 10) * 400} 1000`;
    document.getElementById('miniAcc').textContent = acc + 'M';
    document.getElementById('gpsAccTel').textContent = acc + 'M';
    document.getElementById('gpsStatusTel').textContent = acc < 20 ? 'LOCKED' : 'SEARCH';
    if (kn > maxSpeedKn) maxSpeedKn = kn;
    document.getElementById('statMaxSpeed').textContent = maxSpeedKn.toFixed(1) + " kn";
    document.getElementById('statDistance').textContent = totalDistanceNM.toFixed(2) + " NM";
    document.getElementById('megaNeedleGroup').setAttribute('transform', `rotate(${(Math.min(kn, 6) / 6 * 240) - 120} 100 110)`);
  }, null, { enableHighAccuracy: true });

  async function fetchWeather() {
    try {
        const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=60.03&longitude=22.92&hourly=windspeed_10m,winddirection_10m,weathercode,temperature_2m&wind_speed_unit=ms&timezone=Europe%2FHelsinki`);
        fullWeatherData = await resp.json();
        const hr = new Date().getHours();
        document.getElementById('windMain').textContent = fullWeatherData.hourly.windspeed_10m[hr].toFixed(1) + ' M/S';
        document.getElementById('windDir').style.transform = `rotate(${(fullWeatherData.hourly.winddirection_10m[hr] + 180) % 360}deg)`;
        const code = fullWeatherData.hourly.weathercode[hr];
        document.getElementById('mainWeatherIcon').textContent = getWeatherIcon(code, hr);
    } catch (e) {}
  }

  fetchWeather(); updateWaterLevel();
  setInterval(fetchWeather, 1800000); setInterval(updateWaterLevel, 900000);
  setInterval(checkReminder, 10000);
});
</script>
</body>
</html>
