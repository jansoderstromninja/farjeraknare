<style>
:root {
  --bg: #05080f;
  --surface: #121a2b;
  --glass: rgba(24, 33, 53, 0.9);
  --glass-border: rgba(255, 255, 255, 0.3);
  --text: #ffffff;
  --accent: #3B82F6;
  --signal-yellow: #FACC15; 
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  overflow-y: auto; /* Tillåt scroll på små skärmar om det behövs */
  display: flex;
  flex-direction: column;
}

/* ── RESPONSIV DASHBOARD ── */
.dashboard {
  display: grid;
  padding: 12px;
  gap: 12px;
  flex: 1;
  /* Standard: 4 kolumner (Landskap/Mac) */
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: minmax(100px, auto);
}

/* MOBIL-ANPASSNING (När skärmen är smal/stående) */
@media (max-width: 800px) {
  .dashboard {
    grid-template-columns: repeat(2, 1fr); /* Bara 2 kolumner */
  }
  
  #btnGrid {
    grid-column: 1 / 3 !important; /* Knapparna tar hela bredden överst */
    grid-row: auto !important;
  }

  .tile-speed {
    grid-column: 1 / 3 !important; /* Speedo tar hela bredden under knapparna */
    grid-row: auto !important;
    min-height: 200px;
  }

  .tile-water, .tile-log {
    grid-column: auto !important;
    grid-row: auto !important;
  }
}

/* GRUNDSTIL RUROR */
.tile {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

.tile-title {
  font-size: 11px;
  font-weight: 900;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

/* KNAPP-GRID */
#btnGrid {
  grid-column: 1 / 3;
  grid-row: 1 / 4;
  display: grid !important;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.tile-speed { grid-column: 3 / 5; grid-row: 1 / 3; justify-content: center; align-items: center; }

/* KNAPPAR */
.v-btn {
  width: 100%;
  aspect-ratio: 1 / 1; /* Gör knapparna kvadratiska */
  position: relative;
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 0px rgba(0,0,0,0.4);
}

.v-btn:active { transform: translateY(2px); filter: brightness(1.2); }
.v-btn-emoji { font-size: 32px; }
.v-btn-label { font-size: 12px; font-weight: 900; margin-top: 4px; text-transform: uppercase; }

/* GULA BADGES */
.v-btn-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  background: var(--signal-yellow);
  color: #000;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 900;
  border: 2px solid #000;
}

.dep-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--glass-border); }
#speedVal { font-size: 20px; font-weight: 900; }
</style>
