<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Färjeräknare TACTICAL v1.8.0</title>
<style>
:root {
  --bg: #000000;
  --panel: #21262d; 
  --border: #3d444d;
  --text: #ffffff;
  --accent: #ff453a; 
  --safe: #30d158;   
  --warning: #ffd60a; 
  --dim: #8e8e93;
}

*, *::before, *::after { 
    box-sizing: border-box; margin: 0; padding: 0; 
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
}

body {
  background: var(--bg); color: var(--text);
  font-family: 'SF Mono', 'Roboto Mono', monospace;
  height: 100dvh; width: 100vw;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ── DASHBOARD GRID ── */
.dashboard {
  display: grid; 
  grid-template-columns: 1fr 1fr 1.2fr;
  grid-template-rows: repeat(3, 1fr); 
  gap: 8px; padding: 8px; flex: 1;
  min-height: 0;
}

.tile {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px; 
  display: flex; flex-direction: column;
  position: relative; overflow: hidden; min-height: 0;
}

.tile-header {
    font-size: 9px; font-weight: 900; color: #fff;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 5px; border-bottom: 1px solid var(--border);
    padding-bottom: 3px; flex-shrink: 0;
    display: flex; justify-content: space-between;
}

/* ── DEPARTURE ALERT (v1.8.0) ── */
@keyframes blink-red {
    0% { color: #fff; }
    50% { color: var(--accent); }
    100% { color: #fff; }
}
.alert-active {
    animation: blink-red 1s infinite;
}
.alert-text {
    color: var(--accent); font-weight: 900; display: none;
}
.alert-active .alert-text { display: inline; }

/* ── KNAPP-GRID ── */
.btn-grid-area {
  grid-column: 1 / 3; grid-row: 1 / 4;
  display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 6px;
}

.v-btn {
  position: relative; width: 100%; height: 100%; 
  border: 1px solid var(--border); background: var(--panel);
  border-radius: 8px; display: flex; flex-direction: column; 
  align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.1s;
}
.v-btn:active { background: #30363d; transform: scale(0.98); }
.v-btn.removing { background-color: var(--accent) !important; color: #000; }

.v-btn-emoji { font-size: clamp(30px, 7.5vh, 60px); line-height: 1; margin-bottom: 1px; pointer-events: none; }
.v-btn-label { font-size: clamp(8px, 1.3vh, 11px); font-weight: 800; color: #fff; text-transform: uppercase; pointer-events: none; }

.v-btn-badge {
  position: absolute; top: 4px; right: 4px; 
  background: var(--warning); color: #000;
  padding: 1px 4px; border: 1px solid #000;
  border-radius: 3px; font-size: clamp(10px, 1.8vh, 15px); font-weight: 900;
}

/* ── INSTRUMENTS ── */
.tile-speed { grid-column: 3 / 4; grid-row: 1 / 2; justify-content: center; align-items: center; cursor: pointer; }
.tile-env   { grid-column: 3 / 4; grid-row: 2 / 3; cursor: pointer; justify-content: space-between; }
.tile-log   { grid-column: 3 / 4; grid-row: 3 / 4; cursor: pointer; }

.speedo-wrap { width: 100%; position: relative; display: flex; justify-content: center; flex: 1; min-height: 0; }
.speedo-num { font-size: clamp(35px, 8.5vh, 68px); font-weight: 300; color: #fff; line-height: 1; }
.water-display { font-size: clamp(24px, 4.5vh, 38px); font-weight: 300; color: var(--safe); }

/* ── SPARKLINE GRAF (v1.8.0) ── */
.sparkline-container {
    width: 100%; height: 30px; margin-top: auto; 
    border-top: 1px solid #111; padding-top: 5px;
}

.dep-list { flex: 1; overflow: hidden; display: flex; flex-direction: column; margin-top: 5px; }
.dep-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #111; font-size: 10px; }

.overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 15px; }
.overlay.show { display: flex; }
.overlay-scroll { flex: 1; overflow-y: auto; }

.sys-bar { height: 20px; background: #000; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 8px; font-weight: 800; color: #4a5568; flex-shrink: 0; }

@media (max-width: 950px) or (orientation: portrait) {
  body { overflow-y: auto; }
  .dashboard { display: flex; flex-direction: column; height: auto; min-height: auto; }
  .btn-grid-area { grid-template-columns: repeat(3, 1fr); min-height: 450px; }
  .tile { min-height: 150px; margin-bottom: 5px; overflow: visible; }
}
</style>
</head>
<body>

<div class="dashboard">
  <div class="btn-grid-area">
      <button class="v-btn" onpointerdown="btnDown('personbil', this)" onpointerup="btnUp('personbil', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_personbil">0</span><span class="v-btn-emoji">🚗</span><span class="v-btn-label">Bil</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('paketbil', this)" onpointerup="btnUp('paketbil', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_paketbil">0</span><span class="v-btn-emoji">🚐</span><span class="v-btn-label">Paket</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('lastbil', this)" onpointerup="btnUp('lastbil', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_lastbil">0</span><span class="v-btn-emoji">🚛</span><span class="v-btn-label">Lastbil</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('traktor', this)" onpointerup="btnUp('traktor', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_traktor">0</span><span class="v-btn-emoji">🚜</span><span class="v-btn-label">Traktor</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('cykel', this)" onpointerup="btnUp('cykel', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_cykel">0</span><span class="v-btn-emoji">🚲</span><span class="v-btn-label">Cykel</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('mc', this)" onpointerup="btnUp('mc', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_mc">0</span><span class="v-btn-emoji">🏍️</span><span class="v-btn-label">MC</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('fotgangare', this)" onpointerup="btnUp('fotgangare', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_fotgangare">0</span><span class="v-btn-emoji">🚶</span><span class="v-btn-label">Gående</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('moped', this)" onpointerup="btnUp('moped', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_moped">0</span><span class="v-btn-emoji">🛵</span><span class="v-btn-label">Moped</span>
      </button>
      <button class="v-btn" onpointerdown="btnDown('fyrhjuling', this)" onpointerup="btnUp('fyrhjuling', this)" onpointerleave="btnCancel()">
          <span class="v-btn-badge" id="b_fyrhjuling">0</span><span class="v-btn-emoji">🏎️</span><span class="v-btn-label">ATV</span>
      </button>
  </div>

  <div class="tile tile-speed" onclick="toggleOverlay('navOverlay', true)">
    <div class="tile-header">VELOCITY / TACTICAL</div>
    <div class="speedo-wrap">
        <svg viewBox="0 0 200 120" style="height: 100%; width: auto;">
            <path d="M 40 100 A 70 70 0 1 1 160 100" fill="none" stroke="#111" stroke-width="12" stroke-dasharray="8 2"/>
            <path id="speedArc" d="M 40 100 A 70 70 0 1 1 160 100" fill="none" stroke="var(--accent)" stroke-width="12" stroke-dasharray="0 1000" />
        </svg>
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -40%); text-align:center;">
            <span class="speedo-num" id="mainSpeedNum">0.0</span>
            <span style="font-size:9px; font-weight:900; color:var(--accent); display:block;">KNOTS</span>
        </div>
    </div>
  </div>

  <div class="tile tile-env" onclick="toggleOverlay('weatherOverlay', true)">
    <div class="tile-header">ENVIRONMENT / HANGÖ</div>
    <div class="water-display" id="waterDisplay">-- CM</div>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="display:flex; align-items:center; gap:8px;">
            <span id="mainWeatherIcon" style="font-size:24px;">☀️</span>
            <span id="windMain" style="font-weight:800; font-size:18px;">-- M/S</span>
        </div>
        <div id="windDir"><svg width="24" height="24" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="var(--accent)"/></svg></div>
    </div>
  </div>

  <div class="tile tile-log" onclick="toggleOverlay('statsOverlay', true)">
    <div class="tile-header" id="missionHeader">
        <span>MISSION SUMMARY</span>
        <span class="alert-text">CHECK_PIER!</span>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
        <div style="background:rgba(0,0,0,0.3); padding:4px; text-align:center; border-radius:4px;"><span style="font-size:7px; color:var(--dim); display:block;">VEH</span><span id="miniStatTotal" style="font-size:14px; font-weight:800; color:#fff;">0</span></div>
        <div style="background:rgba(0,0,0,0.3); padding:4px; text-align:center; border-radius:4px;"><span style="font-size:7px; color:var(--dim); display:block;">DEP</span><span id="miniStatTrips" style="font-size:14px; font-weight:800; color:#fff;">0</span></div>
    </div>
    <div class="dep-list" id="departureLog"></div>
    <!-- SPARKLINE -->
    <div class="sparkline-container" id="sparklineArea"></div>
  </div>
</div>

<div class="sys-bar">
    <div style="display:flex; align-items:center;"><div id="syncDot" style="width:6px; height:6px; background:grey; border-radius:1px; margin-right:5px;"></div><span>v1.8.0-B / INTEL_UPDATE</span></div>
    <div id="gpsStatusText">GPS_READY</div>
</div>

<!-- OVERLAYS -->
<div id="navOverlay" class="overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><span style="color:#fff; font-weight:900;">NAVIGATION_DATA</span><button onclick="toggleOverlay('navOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:8px 15px; font-weight:800; cursor:pointer;">CLOSE</button></div>
    <div class="overlay-scroll">
        <div class="tile" style="margin-bottom:10px;"><span class="tile-header">MAX_SPEED</span><span id="statMaxSpeed" style="font-size:54px; font-weight:300;">0.0 kn</span></div>
        <div class="tile" style="margin-bottom:10px;"><span class="tile-header">DISTANCE</span><span id="statDistance" style="font-size:54px; font-weight:300;">0.00 NM</span></div>
    </div>
</div>

<div id="weatherOverlay" class="overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><span style="color:#fff; font-weight:900;">WEATHER_48H</span><button onclick="toggleOverlay('weatherOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 25px; font-weight:800; cursor:pointer;">CLOSE</button></div>
    <div id="prognosContent" class="overlay-scroll"></div>
</div>

<div id="statsOverlay" class="overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><span style="color:#fff; font-weight:900;">TRAFFIC_STATS</span><button onclick="toggleOverlay('statsOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:8px 15px; font-weight:800; cursor:pointer;">CLOSE</button></div>
    <div id="statsContent" class="overlay-scroll">
        <div class="tile" style="margin-bottom:15px;"><span class="tile-header">TOTAL_VEHICLES</span><div id="statTotalFull" style="font-size:72px; color:var(--safe); font-weight:300;">0</div></div>
        <div class="tile"><span class="tile-header">TOTAL_TRIPS</span><div id="statTripsFull" style="font-size:72px; font-weight:300;">0</div></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q", authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare", databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

var db, logsRef, tripsRef, fullWeatherData, currentLogs = {}, currentTrips = {};
var maxSpeedKn = 0, totalDistanceNM = 0, lastLat = null, lastLon = null;
var lastDepartureTs = Date.now();
var undoTimer = null, didUndo = false;

// ── BUTTON LOGIC ──
function btnDown(id, btn) {
    didUndo = false;
    undoTimer = setTimeout(() => {
        didUndo = true;
        btn.classList.add('removing');
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
        if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: -1 });
        setTimeout(() => btn.classList.remove('removing'), 1000);
    }, 700);
}
function btnUp(id, btn) {
    clearTimeout(undoTimer);
    if (!didUndo) {
        if (navigator.vibrate) navigator.vibrate(20);
        if (logsRef) logsRef.push({ type: id, ts: Date.now(), delta: 1 });
    }
}
function btnCancel() { clearTimeout(undoTimer); }

// ── OVERLAY LOGIC ──
function toggleOverlay(id, show) {
    document.getElementById(id).style.display = show ? 'flex' : 'none';
    if (show && id === 'statsOverlay') calculateStats();
    if (show && id === 'weatherOverlay') renderFullForecast();
}

// ── STATS & SPARKLINE ──
function calculateStats() {
    const logs = Object.values(currentLogs);
    const trips = Object.values(currentTrips);
    const total = logs.reduce((sum, l) => sum + (l.delta || 1), 0);
    
    document.getElementById('miniStatTotal').textContent = total;
    document.getElementById('miniStatTrips').textContent = trips.length;
    if(document.getElementById('statTotalFull')) document.getElementById('statTotalFull').textContent = total;
    if(document.getElementById('statTripsFull')) document.getElementById('statTripsFull').textContent = trips.length;

    if (trips.length > 0) {
        lastDepartureTs = Math.max(...trips.map(t => t.ts));
    }
    drawSparkline(logs);
}

function drawSparkline(logs) {
    const hours = new Array(24).fill(0);
    const now = new Date();
    logs.forEach(l => {
        const d = new Date(l.ts);
        if (d.getDate() === now.getDate()) hours[d.getHours()] += (l.delta || 1);
    });
    
    const max = Math.max(...hours, 1);
    const points = hours.map((h, i) => `${(i * 100/23).toFixed(1)},${(30 - (h/max * 25)).toFixed(1)}`).join(' ');
    
    document.getElementById('sparklineArea').innerHTML = `
        <svg viewBox="0 0 100 30" preserveAspectRatio="none" style="width:100%; height:100%;">
            <path d="M ${points}" fill="none" stroke="var(--safe)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    `;
}

// ── REMINDER ──
function checkReminder() {
    const missionHeader = document.getElementById('missionHeader');
    const elapsed = Date.now() - lastDepartureTs;
    if (elapsed > 22 * 60 * 1000) {
        missionHeader.classList.add('alert-active');
    } else {
        missionHeader.classList.remove('alert-active');
    }
}

// ── WEATHER & FMI ──
async function updateWaterLevel() {
  const start = new Date(Date.now() - 3 * 3600 * 1000).toISOString().slice(0, 19) + 'Z';
  try {
    const resp = await fetch(`https://opendata.fmi.fi/wfs?service=WFS&version=2.0.0&request=getFeature&storedquery_id=fmi::observations::mareograph::instant::simple&fmisid=134253&starttime=${start}`);
    const doc = new DOMParser().parseFromString(await resp.text(), 'application/xml');
    const els = doc.getElementsByTagNameNS('*', 'BsWfsElement');
    for (let el of els) {
      if (el.getElementsByTagNameNS('*', 'ParameterName')[0]?.textContent === 'WATLEV') {
        const cm = Math.round(parseFloat(el.getElementsByTagNameNS('*', 'ParameterValue')[0]?.textContent) / 10);
        if (db) db.ref('config/watlev').set({ value: cm, ts: Date.now() });
      }
    }
  } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  firebase.initializeApp(firebaseConfig); db = firebase.database();
  const today = new Date().toISOString().slice(0, 10);
  logsRef = db.ref('days/' + today + '/logs'); tripsRef = db.ref('turer/' + today);

  db.ref('.info/connected').on('value', s => {
      const dot = document.getElementById('syncDot');
      if (dot) dot.style.background = s.val() === true ? 'var(--safe)' : 'grey';
  });

  logsRef.on('value', snap => {
    currentLogs = snap.val() || {};
    ['personbil', 'paketbil', 'lastbil', 'traktor', 'cykel', 'mc', 'fotgangare', 'moped', 'fyrhjuling'].forEach(id => {
        let count = 0; Object.values(currentLogs).forEach(l => { if(l.type === id) count += (l.delta || 1); });
        const el = document.getElementById('b_' + id);
        if (el) el.textContent = Math.max(0, count);
    });
    calculateStats();
  });

  tripsRef.on('value', snap => {
    currentTrips = snap.val() || {};
    const sorted = Object.values(currentTrips).sort((a,b) => b.ts - a.ts).slice(0,4);
    document.getElementById('departureLog').innerHTML = sorted.map(t => `<div class="dep-row"><span>${new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'})}</span><span>${t.from || '---'}</span></div>`).join('');
    calculateStats();
  });

  db.ref('config/watlev').on('value', snap => {
    if (snap.val()) {
        const val = snap.val().value;
        const disp = document.getElementById('waterDisplay');
        if (disp) {
            disp.textContent = (val > 0 ? '+' : '') + val + ' CM';
            disp.style.color = (val < -20 || val > 20) ? 'var(--accent)' : 'var(--safe)';
        }
    }
  });

  navigator.geolocation.watchPosition(pos => {
    const kn = pos.coords.speed * 1.94384 || 0;
    document.getElementById('mainSpeedNum').textContent = kn.toFixed(1);
    document.getElementById('speedArc').style.strokeDasharray = `${(Math.min(kn, 10) / 10) * 400} 1000`;
    document.getElementById('miniAcc').textContent = `${Math.round(pos.coords.accuracy)}M`;
    if (kn > maxSpeedKn) maxSpeedKn = kn;
    document.getElementById('statMaxSpeed').textContent = maxSpeedKn.toFixed(1) + " kn";
  }, null, { enableHighAccuracy: true });

  fetchWeather(); updateWaterLevel();
  setInterval(fetchWeather, 1800000); 
  setInterval(updateWaterLevel, 900000);
  setInterval(checkReminder, 10000);
});

async function fetchWeather() {
    try {
        const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=60.03&longitude=22.92&hourly=windspeed_10m,winddirection_10m,weathercode,temperature_2m&wind_speed_unit=ms&timezone=Europe%2FHelsinki`);
        fullWeatherData = await resp.json();
        const hr = new Date().getHours();
        document.getElementById('windMain').textContent = fullWeatherData.hourly.windspeed_10m[hr].toFixed(1) + ' M/S';
        document.getElementById('windDir').style.transform = `rotate(${(fullWeatherData.hourly.winddirection_10m[hr] + 180) % 360}deg)`;
        const codes = { 0: "☀️", 1: "🌤️", 2: "🌤️", 3: "☁️", 45: "🌫️", 51: "🌧️", 61: "🌧️", 71: "❄️", 95: "⛈️" };
        document.getElementById('mainWeatherIcon').textContent = codes[fullWeatherData.hourly.weathercode[hr]] || "🌤️";
    } catch (e) {}
}

function renderFullForecast() {
    const container = document.getElementById('prognosContent');
    if (!fullWeatherData) return;
    let html = ""; const h = fullWeatherData.hourly; const nowIdx = new Date().getHours();
    for (let i = nowIdx; i < h.time.length && i < nowIdx + 48; i++) {
        const speed = h.windspeed_10m[i];
        const color = speed < 6 ? "#30d158" : speed < 12 ? "#ffd60a" : "#ff453a";
        const rotation = (h.winddirection_10m[i] + 180) % 360;
        html += `<div class="prognos-row" style="border-left-color: ${color}">
            <div style="font-weight:900; font-size:14px;">${h.time[i].slice(11, 16)}</div>
            <div style="font-size:22px; text-align:center;">☀️</div>
            <div style="font-weight:800; color:${color}">${speed.toFixed(1)} m/s</div>
            <div style="transform: rotate(${rotation}deg); display:flex; justify-content:center;"><svg width="18" height="18" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="${color}"/></svg></div>
            <div style="font-weight:800; text-align:right; color:#fff">${h.temperature_2m[i].toFixed(1)}°C</div>
        </div>`;
    }
    container.innerHTML = html;
}
</script>
</body>
</html>
