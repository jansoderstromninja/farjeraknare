<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Färjeräknare TACTICAL GREY v1.6.3</title>
<style>
:root {
  --bg: #000000;
  --panel: #161b22; /* Mörkgrå "Tactical Grey" */
  --border: #30363d;
  --text: #ffffff;
  --accent: #ff3b30; 
  --safe: #10B981;   
  --warning: #FACC15; 
  --dim: #8b949e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'SF Mono', 'Roboto Mono', monospace;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── DASHBOARD GRID ── */
.dashboard {
  display: grid; 
  grid-template-columns: 1fr 1fr 1.2fr;
  grid-template-rows: 1fr 1fr 1fr;
  gap: 10px; padding: 10px; flex: 1;
}

.tile {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 15px; display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
}

.tile-header {
    font-size: 10px; font-weight: 800; color: var(--accent);
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 8px; border-bottom: 1px solid var(--border);
    padding-bottom: 5px; display: flex; justify-content: space-between;
}

#btnGrid {
  grid-column: 1 / 3; grid-row: 1 / 4;
  display: grid !important; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 8px;
}

.tile-speed { grid-column: 3 / 4; grid-row: 1 / 2; justify-content: center; align-items: center; }
.tile-env   { grid-column: 3 / 4; grid-row: 2 / 3; cursor: pointer; }
.tile-log   { grid-column: 3 / 4; grid-row: 3 / 4; cursor: pointer; }

/* KNAPPAR - STÖRRE BILDER */
.v-btn {
  position: relative; width: 100%; height: 100%; 
  border: 1px solid var(--border); background: #0d1117;
  border-radius: 8px; display: flex; flex-direction: column; 
  align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.1s;
}
.v-btn:active { background: #21262d; transform: scale(0.97); border-color: var(--accent); }
.v-btn.removing { background-color: var(--accent) !important; }

.v-btn-emoji { font-size: clamp(45px, 8vh, 65px); margin-bottom: 2px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
.v-btn-label { font-size: 12px; font-weight: 800; color: #fff; text-transform: uppercase; }

.v-btn-badge {
  position: absolute; top: 8px; right: 8px; 
  background: var(--bg); color: var(--accent);
  padding: 2px 8px; border: 2px solid var(--accent);
  border-radius: 6px; font-size: 16px; font-weight: 900;
}

/* ── SPEEDO ── */
.speedo-wrap { width: 100%; position: relative; display: flex; justify-content: center; }
.speedo-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%); text-align: center; }
.speedo-num { font-size: 64px; font-weight: 300; }
.speedo-unit { font-size: 12px; font-weight: 900; color: var(--accent); display: block; }

/* ── ENV ── */
.water-display { font-size: 38px; font-weight: 300; color: var(--safe); }
.wind-row-t { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }

/* ── OVERLAYS (FIXED SCROLL) ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000;
  display: none; flex-direction: column; padding: 25px;
}
.overlay.show { display: flex; }
.overlay-content { 
  flex: 1; 
  overflow-y: scroll !important; /* Tvinga fram skrollning */
  -webkit-overflow-scrolling: touch;
  padding-bottom: 60px;
}

.prognos-row {
  display: flex; align-items: center; gap: 12px; 
  background: #161b22; margin-bottom: 6px; padding: 15px;
  border: 1px solid var(--border); border-left: 4px solid var(--accent);
  border-radius: 4px;
}

.sys-bar {
  height: 25px; background: #000; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 15px; font-size: 9px; font-weight: 800; color: var(--dim);
}
.dot-on { background: var(--safe); box-shadow: 0 0 5px var(--safe); width: 6px; height: 6px; border-radius: 1px; margin-right: 5px; }

@media (max-width: 950px) {
  body { overflow-y: auto; }
  .dashboard { display: flex; flex-direction: column; height: auto; }
  #btnGrid { grid-template-columns: repeat(3, 1fr); min-height: 480px; }
  .tile { min-height: 180px; margin-bottom: 8px; }
}
</style>
</head>
<body>

<div class="dashboard">
  <div id="btnGrid"></div>

  <!-- SPEEDO -->
  <div class="tile tile-speed" onclick="toggleOverlay('navOverlay', true)">
    <div class="tile-header"><span>VELOCITY / TACTICAL</span><span id="miniAcc">GPS: --</span></div>
    <div class="speedo-wrap">
        <svg viewBox="0 0 200 120" width="100%">
            <path d="M 40 100 A 70 70 0 1 1 160 100" fill="none" stroke="#222" stroke-width="12" stroke-dasharray="8 2"/>
            <path id="speedArc" d="M 40 100 A 70 70 0 1 1 160 100" fill="none" stroke="var(--accent)" stroke-width="12" stroke-dasharray="0 1000" style="transition: stroke-dasharray 0.4s;"/>
        </svg>
        <div class="speedo-val">
            <span class="speedo-num" id="mainSpeedNum">0.0</span>
            <span class="speedo-unit">KNOTS</span>
        </div>
    </div>
  </div>

  <!-- ENV -->
  <div class="tile tile-env" onclick="toggleOverlay('weatherOverlay', true)">
    <div class="tile-header">ENVIRONMENT / RUSSARÖ</div>
    <div class="water-display" id="waterDisplay">-- CM</div>
    <div class="wind-row-t">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="mainWeatherIcon" style="font-size: 28px;">☀️</span>
            <span id="windMain" style="font-weight: 800; font-size: 20px;">-- M/S</span>
        </div>
        <div id="windDir"><svg width="24" height="24" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="var(--accent)"/></svg></div>
    </div>
  </div>

  <!-- LOG -->
  <div class="tile tile-log" onclick="toggleOverlay('statsOverlay', true)">
    <div class="tile-header">MISSION LOG / STATS</div>
    <div id="departureLog" style="overflow-y: hidden; flex: 1; font-size: 11px;"></div>
  </div>
</div>

<div class="sys-bar">
    <div style="display: flex; align-items: center;"><div id="syncDot" class="dot-on"></div><span>v1.6.3-B / GREY_TACTICAL</span></div>
    <div id="gpsStatusText">GPS_READY</div>
</div>

<!-- OVERLAYS -->
<div id="navOverlay" class="overlay">
    <div class="tile-header"><span>NAVIGATION_DEEP_DATA</span><button onclick="toggleOverlay('navOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; cursor:pointer; font-weight:800;">CLOSE</button></div>
    <div class="overlay-content">
        <div class="tile" style="margin-bottom:10px;"><span class="tile-header">MAX_VELOCITY</span><span id="statMaxSpeed" style="font-size:48px;">0.0 kn</span></div>
        <div class="tile" style="margin-bottom:10px;"><span class="tile-header">TOTAL_DISTANCE</span><span id="statDistance" style="font-size:48px;">0.00 NM</span></div>
        <div class="tile"><span class="tile-header">COORDINATES</span><span id="statPos" style="font-size:18px; color:var(--safe)">--</span></div>
    </div>
</div>

<div id="weatherOverlay" class="overlay">
    <div class="tile-header"><span>METEOROLOGICAL_REPORT_48H</span><button onclick="toggleOverlay('weatherOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; cursor:pointer; font-weight:800;">CLOSE</button></div>
    <div id="prognosContent" class="overlay-content"></div>
</div>

<div id="statsOverlay" class="overlay">
    <div class="tile-header"><span>TRAFFIC_ANALYSIS_REPORT</span><button onclick="toggleOverlay('statsOverlay', false)" style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; cursor:pointer; font-weight:800;">CLOSE</button></div>
    <div id="statsContent" class="overlay-content">
        <div class="tile" style="margin-bottom:10px;"><span class="tile-header">TOTAL_VEHICLES</span><div id="statTotal" style="font-size:64px; color:var(--safe);">0</div></div>
        <div class="tile"><span class="tile-header">TOTAL_DEPARTURES</span><div id="statTrips" style="font-size:64px;">0</div></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDregBlw1hjcHotJAk8938xXAjQKbHXS1Q", authDomain: "fordonsraknare.firebaseapp.com",
  projectId: "fordonsraknare", databaseURL: "https://fordonsraknare-default-rtdb.europe-west1.firebasedatabase.app"
};

const CATS = [
  { id: 'personbil',  label: 'Bil', emoji: '🚗' }, { id: 'paketbil',   label: 'Paket', emoji: '🚐' },
  { id: 'lastbil',    label: 'Lastbil', emoji: '🚛' }, { id: 'traktor',    label: 'Traktor', emoji: '🚜' },
  { id: 'cykel',      label: 'Cykel', emoji: '🚲' }, { id: 'mc',         label: 'MC', emoji: '🏍️' },
  { id: 'fotgangare', label: 'Gående', emoji: '🚶' }, { id: 'moped',      label: 'Moped', emoji: '🛵' },
  { id: 'fyrhjuling', label: 'ATV', emoji: '🏎️' }
];

var db, logsRef, tripsRef, fullWeatherData, currentLogs = {}, currentTrips = {};
var maxSpeedKn = 0, totalDistanceNM = 0, lastLat = null, lastLon = null;

function getCompassLabel(deg) {
    const sectors = ["N", "NO", "O", "SO", "S", "SV", "V", "NV"];
    return sectors[Math.round(deg / 45) % 8];
}

function toggleOverlay(id, show) {
    document.getElementById(id).style.display = show ? 'flex' : 'none';
    if (show && id === 'statsOverlay') {
        document.getElementById('statTotal').textContent = Object.values(currentLogs).reduce((sum, l) => sum + (l.delta || 1), 0);
        document.getElementById('statTrips').textContent = Object.values(currentTrips).length;
    }
    if (show && id === 'weatherOverlay') renderFullForecast();
}

function renderFullForecast() {
    const container = document.getElementById('prognosContent');
    if (!fullWeatherData) return;
    let html = ""; const h = fullWeatherData.hourly; const nowIdx = new Date().getHours();
    for (let i = nowIdx; i < h.time.length && i < nowIdx + 48; i++) {
        const time = h.time[i].slice(11, 16);
        const speed = h.windspeed_10m[i];
        const color = speed < 6 ? "#10B981" : speed < 12 ? "#F59E0B" : "#ff3b30";
        const deg = h.winddirection_10m[i];
        const rotation = (deg + 180) % 360;
        
        html += `<div class="prognos-row" style="border-left-color: ${color}">
            <div style="font-weight:900; min-width:55px; font-size:14px;">${time}</div>
            <div style="font-size:22px; min-width:40px; text-align:center;">${getWeatherIcon(h.weathercode[i], time, h.temperature_2m[i])}</div>
            <div style="flex:1; color:${color}; font-weight:800;">${speed.toFixed(1)} m/s</div>
            <div style="font-weight:800; min-width:60px; text-align:right;">${h.temperature_2m[i].toFixed(1)}°C</div>
            <div style="transform: rotate(${rotation}deg); margin-left:15px; display:flex; flex-direction:column; align-items:center;">
                <svg width="18" height="18" viewBox="0 0 22 22"><path d="M11 2 L16 17 L11 13 L6 17 Z" fill="${color}"/></svg>
                <span style="font-size:8px; font-weight:800; margin-top:2px;">${getCompassLabel(deg)}</span>
            </div>
        </div>`;
    }
    container.innerHTML = html;
}

function getWeatherIcon(code, timeStr, temp) {
    const hour = parseInt(timeStr.slice(0, 2));
    const isNight = hour < 6 || hour > 22;
    if (temp < -15) return "🥶";
    if (code === 0) return isNight ? "🌙" : "☀️";
    if (code <= 3) return isNight ? "☁️" : "🌤️";
    if (code >= 51 && code <= 67) return "🌧️";
    if (code >= 71 && code <= 77) return "❄️";
    return "🌤️";
}

document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('btnGrid');
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'v-btn';
    btn.innerHTML = `<span class="v-btn-badge" id="b_${cat.id}">0</span><span class="v-btn-emoji">${cat.emoji}</span><span class="v-btn-label">${cat.label}</span>`;
    let timer;
    btn.onpointerdown = () => timer = setTimeout(() => {
        btn.classList.add('removing');
        if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
        if (logsRef) logsRef.push({ type: cat.id, ts: Date.now(), delta: -1 });
        setTimeout(() => btn.classList.remove('removing'), 1000);
    }, 800);
    btn.onpointerup = () => clearTimeout(timer);
    btn.onclick = () => { if(!btn.classList.contains('removing')) { if(navigator.vibrate) navigator.vibrate(20); if(logsRef) logsRef.push({type: cat.id, ts: Date.now(), delta: 1}); } };
    grid.appendChild(btn);
  });

  firebase.initializeApp(firebaseConfig); db = firebase.database();
  const today = new Date().toISOString().slice(0, 10);
  logsRef = db.ref('days/' + today + '/logs'); tripsRef = db.ref('turer/' + today);
  
  logsRef.on('value', snap => {
    currentLogs = snap.val() || {};
    CATS.forEach(cat => {
        let count = 0; Object.values(currentLogs).forEach(l => { if(l.type === cat.id) count += (l.delta || 1); });
        document.getElementById('b_' + cat.id).textContent = Math.max(0, count);
    });
  });
  tripsRef.on('value', snap => {
    currentTrips = snap.val() || {};
    const sorted = Object.values(currentTrips).sort((a,b) => b.ts - a.ts).slice(0,4);
    document.getElementById('departureLog').innerHTML = sorted.map(t => `<div class="dep-row"><span>${new Date(t.ts).toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'})}</span><span>${t.from || '---'}</span></div>`).join('');
  });
  db.ref('config/watlev').on('value', snap => {
    if (snap.val()) {
        const val = snap.val().value;
        document.getElementById('waterDisplay').textContent = (val > 0 ? '+' : '') + val + ' CM';
    }
  });

  navigator.geolocation.watchPosition(pos => {
    const kn = pos.coords.speed * 1.94384 || 0;
    const acc = pos.coords.accuracy;
    document.getElementById('mainSpeedNum').textContent = kn.toFixed(1);
    document.getElementById('speedArc').style.strokeDasharray = `${(Math.min(kn, 10) / 10) * 400} 1000`;
    document.getElementById('miniAcc').textContent = `GPS: ${Math.round(acc)}M`;
    if (kn > maxSpeedKn) maxSpeedKn = kn;
    document.getElementById('statMaxSpeed').textContent = maxSpeedKn.toFixed(1) + " kn";
    document.getElementById('statPos').textContent = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
  }, null, { enableHighAccuracy: true });

  fetchWeather();
});

async function fetchWeather() {
    try {
        const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=60.03&longitude=22.92&hourly=windspeed_10m,winddirection_10m,weathercode,temperature_2m&wind_speed_unit=ms&timezone=Europe%2FHelsinki`);
        fullWeatherData = await resp.json();
        const hr = new Date().getHours();
        document.getElementById('windMain').textContent = fullWeatherData.hourly.windspeed_10m[hr].toFixed(1) + ' M/S';
        document.getElementById('windDir').style.transform = `rotate(${(fullWeatherData.hourly.winddirection_10m[hr] + 180) % 360}deg)`;
        document.getElementById('mainWeatherIcon').textContent = getWeatherIcon(fullWeatherData.hourly.weathercode[hr], hr + ":00", fullWeatherData.hourly.temperature_2m[hr]);
    } catch (e) {}
}
</script>
</body>
</html>
