name: Deploy to GitHub Pages

# Egen Pages-deploy i stället för standardbyggaren (pages-build-deployment)
# — undviker gränsen på 10 builds/timme. Statiska filer, inga byggsteg.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Flippar Pages-källan till "GitHub Actions" om den står på branchbygge —
      # configure-pages uppdaterar inte build_type på en befintlig sajt.
      # Informativt steg: fäller inte jobbet, PUT är no-op när källan redan är rätt.
      - name: Säkerställ att Pages-källan är GitHub Actions
        run: |
          curl -sS -o /tmp/pages-resp.txt -w "Pages API HTTP %{http_code}\n" -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}'
          cat /tmp/pages-resp.txt || true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Hela repot laddas upp som statiskt innehåll (.git/.github exkluderas av actionen)
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
